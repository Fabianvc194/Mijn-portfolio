<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reverend Insanity — Fan Continuation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: #1a1a1a;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  .header {
    text-align: center;
    padding: 2rem 1rem 1.5rem;
    border-bottom: 1px solid #2a2a2a;
  }

  .header h1 {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 2.5rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #f0e6d2;
    margin-bottom: 0.3rem;
  }

  .header .subtitle {
    font-size: 0.95rem;
    color: #9a9a9a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 2rem;
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .sidebar {
    border-right: 1px solid #2a2a2a;
    padding-right: 1.5rem;
    position: sticky;
    top: 1rem;
    align-self: start;
    max-height: calc(100vh - 2rem);
    overflow-y: auto;
  }

  .sidebar h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #888;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #2a2a2a;
  }

  .chapter-list {
    list-style: none;
  }

  .chapter-list li {
    padding: 0.6rem 0.8rem;
    margin-bottom: 0.25rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    color: #bdbdbd;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    border-left: 3px solid transparent;
  }

  .chapter-list li:hover {
    background: #242424;
    color: #f0e6d2;
  }

  .chapter-list li.active {
    background: #2a241a;
    color: #f0e6d2;
    border-left-color: #c9a961;
    font-weight: 600;
  }

  .chapter-num {
    display: block;
    font-size: 0.75rem;
    color: #888;
    letter-spacing: 0.1em;
    margin-bottom: 0.15rem;
  }

  .chapter-list li.active .chapter-num {
    color: #c9a961;
  }

  .reader {
    min-width: 0;
  }

  .reader h2.chapter-title {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 2rem;
    color: #f0e6d2;
    margin-bottom: 0.3rem;
    line-height: 1.25;
  }

  .reader .chapter-label {
    font-size: 0.8rem;
    color: #c9a961;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1.5rem;
  }

  .chapter-body {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 1.08rem;
    line-height: 1.85;
    color: #e8e8e8;
  }

  .chapter-body p {
    margin-bottom: 1.2rem;
    text-align: justify;
  }

  .chapter-body p:first-of-type::first-letter {
    font-size: 2.8rem;
    font-weight: 600;
    float: left;
    line-height: 1;
    padding: 0.25rem 0.5rem 0 0;
    color: #c9a961;
  }

  .nav-buttons {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid #2a2a2a;
  }

  .nav-btn {
    flex: 1;
    padding: 0.85rem 1.25rem;
    background: #242424;
    color: #e8e8e8;
    border: 1px solid #333;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .nav-btn:hover:not(:disabled) {
    background: #2a241a;
    border-color: #c9a961;
    color: #f0e6d2;
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .nav-btn.next { text-align: right; }
  .nav-btn.prev { text-align: left; }

  @media (max-width: 768px) {
    .header h1 { font-size: 1.8rem; }
    .header .subtitle { font-size: 0.8rem; }
    .layout {
      grid-template-columns: 1fr;
      gap: 1rem;
      padding: 1rem;
    }
    .sidebar {
      position: static;
      border-right: none;
      border-bottom: 1px solid #2a2a2a;
      padding-right: 0;
      padding-bottom: 1rem;
      max-height: 240px;
    }
    .reader h2.chapter-title { font-size: 1.5rem; }
    .chapter-body { font-size: 1rem; line-height: 1.75; }
    .chapter-body p:first-of-type::first-letter { font-size: 2.2rem; }
  }
</style>
</head>
<body>


<header class="header">
  <h1>Reverend Insanity</h1>
  <div class="subtitle">Fan Continuation — Chapter 2335+</div>
</header>

<main class="layout">
  <aside class="sidebar">
    <h2>Chapters</h2>
    <ul class="chapter-list" id="chapterList"></ul>
  </aside>

  <section class="reader" id="reader">
    <div class="chapter-label" id="chapterLabel"></div>
    <h2 class="chapter-title" id="chapterTitle"></h2>
    <div class="chapter-body" id="chapterBody"></div>

    <div class="nav-buttons">
      <button class="nav-btn prev" id="prevBtn">&larr; Previous Chapter</button>
      <button class="nav-btn next" id="nextBtn">Next Chapter &rarr;</button>
    </div>
  </section>
</main>

<script>
  /* ============================================================
   * HOW TO ADD A NEW CHAPTER
   * ============================================================
   *
   * Each chapter is a plain JavaScript object with three fields:
   *
   *   {
   *     number: 2336,              // integer — shown as "Chapter 2336"
   *     title:  "Chapter Title",   // string  — shown next to the number
   *     body:   `Full chapter text...`  // template literal (backticks)
   *   }
   *
   * Steps:
   *   1. Copy the object block for Chapter 2335 below.
   *   2. Paste it into the `chapters` array, AFTER the existing entry
   *      (keep chapters in ascending order — the list renders them
   *      in array order).
   *   3. Update `number` and `title`.
   *   4. Paste the chapter text between the backticks in `body`.
   *
   * Formatting rules for `body`:
   *   - Use a TEMPLATE LITERAL (backticks `...`), NOT regular quotes.
   *     This lets the text span multiple lines without escaping.
   *   - Separate paragraphs with a BLANK LINE (one empty line between
   *     paragraphs). The renderer splits on blank lines and wraps each
   *     chunk in a <p> tag automatically — do NOT add <p> tags yourself.
   *   - Do NOT use raw backticks inside the text. If the chapter needs
   *     one, escape it as \` or swap for a different character.
   *   - Plain quotes ("..." and '...') are fine and need no escaping.
   *   - HTML in the text is rendered as literal text (safe by default),
   *     so "<sigh>" will show as <sigh>, not as a tag.
   *
   * The UI updates automatically when you add entries — no other code
   * changes are needed. The sidebar index, prev/next buttons, and
   * active-chapter highlighting all derive from this array.
   *
   * Example of adding two chapters:
   *
   *   const chapters = [
   *     { number: 2335, title: "A Triangle Contracts", body: `...` },
   *     { number: 2336, title: "The Ledger Opens",     body: `...` },
   *     { number: 2337, title: "One Degree Missing",   body: `...` }
   *   ];
   *
   * ============================================================ */

  const chapters = [
    {
      number: 2335,
      title: "Forty-Seven Days",
      body: `The Supreme Sovereign Immortal Aperture was vast.

By this stage in his cultivation, its internal space exceeded the land area of three complete regions combined. Heavenly Dao marks floated within it in layered columns — not the world's marks, but marks refined from the world, absorbed and rebuilt into the substrate of a sovereign's foundation.

Fang Yuan had been refining for eleven days by the aperture's internal time count.

At an internal time flow of one hundred to one, those eleven days represented approximately two and a half hours in the external world. In the external world, Great Love Immortal Venerable was currently conducting a public distribution of Gu worms to seventeen Central Continent sects at below-market cost — the most recent in a series of charitable acts whose frequency had increased measurably since the Heavenly Court disaster. He had expressed, on three separate public occasions, that the burden of maintaining such generosity was straining his reserves.

Inside the aperture, Fang Yuan was doing something else entirely.

The anomaly had surfaced at the forty-third layer of Heavenly Dao marks twelve minutes ago by external reckoning.

It was not large. That was what made it significant.

A large disruption was noise — environmental turbulence, the aftermath of the Heavenly Court explosion still settling through Central Continent's Heavenly Dao substrate. What Fang Yuan had detected was small and precise: a single dao mark in the forty-third layer whose refinement pathway had shifted by 0.003 degrees from its established vector.

He ceased refining.

He activated Rank 9 Heavenly Secret Gu.

Three rank eight immortal essences consumed. Within the contact it established with the Heavenly Dao, Fang Yuan read not the current state of the marks but their history — every refinement touch, every vector occupied, every external influence since their formation.

Six seconds. External time: 0.06 seconds.

The deviation was not recent. The forty-third layer mark had begun its drift forty-seven days ago by external reckoning. Forty-seven days. Before the Heavenly Court explosion. Before the crisis had resolved. Before Fang Yuan had begun this refinement cycle.

He expanded the search. Layers thirty through fifty. Seventeen marks total, distributed non-uniformly, each drifting between 0.001 and 0.006 degrees from their established vectors.

Seventeen marks. Forty-seven days. Non-uniform distribution.

This was not Heaven's Will acting on the substrate. Heaven's Will had been diffuse and blunt since Fate Gu's destruction. What Fang Yuan was reading had a specific signature: the intervention of a cultivator who understood the Heavenly Dao's register well enough to alter individual entries without disturbing the surrounding structure.

There was one cultivator living who could do this.

It should be said that Star Constellation Immortal Venerable had spent three million years building Heavenly Court into the primary institutional vessel of Heaven's Will on earth. Her wisdom path's interaction with the Heavenly Dao was not merely deep — it was structural. Even after the explosion, after Fate Gu, after the shattering of a significant portion of her infrastructure, her accumulated imprints on the register remained. Not active formations. Residue. The residue of ten thousand years of a wisdom path venerable working the same substrate.

Residue could be used.

Fang Yuan ran the second deduction.

If the seventeen marks were left to drift, their vectors would converge over approximately ninety days at a shared geometric point within his refinement pathway. At convergence, any dao mark he refined into this region would carry a latent misalignment — invisible at absorption, expressing itself only after six to eighteen months of integration.

A fractional reduction in Heaven Refining efficiency in that substrate region. Not an attack.

A tax. Compounding.

Over ten years: eight percent output reduction. Over thirty: nineteen percent. Over a century, uncorrected: the forty-third layer's entire Heavenly Dao foundation rendered structurally unsound.

He ran the calculation three times. The result was identical each time.

Star Constellation had not tried to stop him. She had constructed a trap that triggered when he succeeded. Every dao mark he refined into this layer from this point forward would be refined into a substrate that was, in the most precise sense, no longer entirely his.

In The Legends of Ren Zu, it was written thus:

Longevity Gu once asked Ren Zu: "What do you fear most?" Ren Zu considered. "A locked door," he said. Longevity Gu shook its head. "A locked door announces itself. What you should fear is a room that grows smaller while you stand in it, so slowly that you only notice when the walls touch your shoulders."

The trap had been set forty-seven days ago. Fang Yuan had been refining inside it for eleven days.

Three paths were immediately apparent.

The first: abandon the layer entirely. Accept a six percent output loss from this cycle. More critically — abandoning the layer would signal to Star Constellation that her intervention had been detected. She would adjust.

The second: continue refining. Accept the tax. Play ignorant. Allow her to operate on a false assumption while Heavenly Secret Gu monitored the drift rate. Cost: the compounding tax across the full timeline. Benefit: she continued acting on premises that were no longer true.

The third path required information he did not yet possess — specifically, whether the seventeen marks were the full extent of the intervention, or the visible surface of a larger structure not yet mapped.

He activated Heavenly Secret Gu a second time. Three more rank eight immortal essences.

The nodes extended outward — into the Heavenly Dao substrate of the external world, rooted in Star Constellation's three-million-year imprint. Full mapping would cost more than he was willing to spend while the trap's existence remained unacknowledged.

He filed the trap as an open variable and continued the query outward.

What Heavenly Secret Gu returned next was not part of the trap.

The dao mark trajectories in the wider substrate — the natural Heavenly Dao, unconnected to Star Constellation's residue — were generating outputs that contradicted each other. Not in the manner of environmental turbulence. Turbulence had a resolution direction; disturbed marks settled along the path of least resistance. These marks were not settling. They were cycling between two equally valid states, as though the Heavenly Dao could not determine which one was true.

Fang Yuan extended the read.

There was a secondary disturbance layered beneath the cycling. Spectral Soul — the entity the world now used as its sun — was changing. Its fire path emanations, which had stabilised into a consistent output pattern following the initial chaos of the Sun-falling arc, were shifting frequency. The shift was not large in absolute terms. Measured against the scale of a Rank 9 sun, it was a rounding error. Measured against its effect on a Heavenly Dao substrate already processing an unresolved contradiction, it was not a rounding error.

Two unresolved inputs. Cycling simultaneously.

Fang Yuan ceased the activation.

It should be understood what he had read. Heavenly Secret Gu operated on the principle that heaven and earth held one truth for each question. Its architecture assumed a singular correct answer existed and could be retrieved. What it had returned was a substrate in which the Heavenly Dao was producing two answers simultaneously — and treating both as valid.

The cause was calculable. Three Rank 9 Gu Masters alive at one time. In recorded history, this had not occurred. Fate Gu had regulated the number of living Venerables across eras precisely because the Heavenly Dao's equilibrium assumed one, at most two. Three was a condition it had not been built to process.

Of the three, Giant Sun alone possessed no Rank 9 Gu. This was not a comfort. A Venerable without a Rank 9 was a Venerable with a single outstanding objective — and a Venerable with a single outstanding objective was more predictable in direction and less predictable in method than one whose primary goals had been achieved. Giant Sun was attempting to refine Rank 9 Blood Path Gu. He lacked the required materials. He would not remain patient indefinitely.

The Heavenly Dao was attempting to resolve a situation it had never been designed to resolve. In the process, it was generating contradictory dao mark futures — paths that could not both exist, laid down simultaneously. The substrate was not unstable in the conventional sense. It was undecided. And an undecided Heavenly Dao was one in which Heavenly Secret Gu's queries returned fractured answers, Heaven Refining operated on shifting targets, and the costs of every calculation increased by a factor that could not yet be quantified.

The world was dreaming.

Fang Yuan stood inside the Supreme Sovereign Immortal Aperture and ran two calculations in parallel.

The first: Star Constellation's trap. Modelable. Three paths, costs quantified, decision pending.

The second: the Heavenly Dao Dreams. Not yet modelable. The inputs were cycling. A calculation built on cycling inputs produced cycling outputs. No resolution was available with current data.

This was the first time since achieving Rank 9 that Fang Yuan had encountered a problem he could not immediately reduce to arithmetic.

He did not move.

Outside the aperture, Great Love Immortal Venerable completed the distribution to the seventeenth sect, expressed regret at the scarcity of resources in difficult times, and accepted their gratitude with a modest smile.

Inside, he was still calculating.`
    },
    {
      number: 2336,
      title: "Blood Deficit",
      body: `Longevity Heaven's upper hall received three delegations that morning: a regional chief from the Northern Plains heartland seeking resolution of a border dispute, the elected head of a mid-ranked sect requesting renewal of a resource covenant, and a minor faction's envoy whose patriarch had recently advanced to Rank 6. Giant Sun Immortal Venerable adjudicated all three within two hours. The border dispute was resolved by a territorial ruling that split the contested region along its natural Qi vein boundary, benefiting neither claimant disproportionately. The covenant was renewed at terms shifted two degrees in the sect's favor — a small gift, calibrated to be noticed. The Rank 6 envoy received a congratulatory Gu worm of the seventh rank and departed satisfied.

It should be said that every action Giant Sun Immortal Venerable took in that hall served a single function: the maintenance of a reputation built across three thousand years of calculated benevolence. Northern Plains' cultivation world did not fear him. It trusted him. Trust — in Fang Yuan's analysis, which Giant Sun had no doubt was running — was worth more than fear as a strategic foundation, because trust was not recalibrated each time the trusted party demonstrated power.

The delegations departed. The hall sealed.

Giant Sun descended.

Below Longevity Heaven's public halls, behind a formation layer he had reopened eleven weeks ago for the first time in five centuries, was a treasury that had never appeared in any official inventory.

It should be said that Giant Sun Immortal Venerable had publicly disavowed Blood Path nine times in the last century alone. His official position was consistent: Blood Path was a deviant cultivation route that eroded the practitioner's foundation, exploited living resources, and produced nothing structurally sustainable. He had made this argument before regional assemblies, inter-sect councils, and twice in joint communiqués with Heavenly Court — once while this treasury already existed in its present form.

The treasury contained forty-three Blood Path Immortal Gu, ranked from five to eight.

The highest-ranked was a Rank 8 Blood Refinement Gu of Giant Sun's own design. It had taken six hundred years to construct. It had never been deployed publicly. It was the foundation tool of a recipe he had spent a further four hundred years completing.

The recipe for a Rank 9 Blood Path Gu existed in two versions.

The first was a reconstruction from the Blood Sea era's fragmentary records — a period before Giant Sun's birth, before any institutional framework for Blood Path had existed. That version identified three required materials. Two were present in the treasury. The third entry read: the root blood of the living world, drawn from its source vein at the moment of maximum Qi saturation. He had not treated this as a literal requirement until four centuries ago. He now treated it as the only requirement that mattered.

The second version was his own derivation — three hundred years of calculation, replacing the ancient record's poetic language with a precise material specification. The source was identifiable: the convergence point of the world's four major earth veins beneath the Central Continent highland. A location that Heavenly Court had controlled, monitored, and sealed for two thousand years.

As of four months ago, Heavenly Court no longer controlled anything in the conventional sense.

This had not changed Giant Sun's position. The convergence point was not unguarded because Heavenly Court was damaged. It was unguarded because it was not guarded by institutions. It was guarded by the world itself — by Heavenly Dao patterns that responded to unauthorized extraction with immediate corrective force, independent of any cultivator enforcement.

Fang Yuan could extract from such locations. Heaven Refining operated precisely by engaging with Heavenly Dao patterns as a refinement substrate rather than an obstacle to circumvent. Giant Sun did not possess Heaven Refining. His path was Luck — and luck could not be substituted for refinement capacity.

He had run this calculation fourteen times across eleven weeks. The result was unchanged each time.

In The Legends of Ren Zu, it was written thus:

Harm Gu once asked Ren Zu: "You have been given a sword and a shield. Another man has been given two swords. Which of you wins?" Ren Zu said: "Ask instead about the third man. The one given nothing." Harm Gu was silent. "He has no weapon," it said. "No," said Ren Zu. "He has no reason to wait."

Between the three Venerables currently alive, Giant Sun alone possessed no Rank 9 Gu. Star Constellation held Wisdom Gu. Fang Yuan held at minimum two Rank 9 Gu of confirmed function — Heavenly Secret Gu had been activated publicly; a second was derivable from his demonstrated Heaven Refining capacity. That both could be verified without intelligence access was itself a data point. Fang Yuan was not hiding those two. He was hiding others.

Giant Sun's Luck Suppression Heavenly Palace registered three possible future trajectories, each computed across a ten-year horizon.

The first: wait. Allow the cold war between Fang Yuan and Star Constellation to erode both parties further. Acquire the root blood through opportunistic means when their conflict destabilised Heavenly Dao enforcement near the convergence point — either by destabilizing the region through sustained clash, or by destroying sufficient surrounding infrastructure that the enforcement mechanism lost its anchor.

The cost of waiting was quantifiable. Every month without a Rank 9 Gu was a month in which either opponent could complete a preparation that closed options permanently. Three Venerables in simultaneous existence was an unprecedented condition. Neither of the other two would allow it to remain static indefinitely. The cold war would resolve. When it did, the resolution's beneficiary would dictate the new equilibrium — and a Venerable without a Rank 9 Gu had no leverage over how that resolution was structured.

The second path: move directly against the convergence point. Use luck path manipulation to compress the Heavenly Dao's corrective response time into a viable extraction window. Accept the corrective force as damage. Extract under pressure.

Eleven weeks of feasibility analysis had not made this viable.

The third: a different source. Not the world's root vein. Not a stored extract. A living entity whose blood carried the requisite quality at sufficient concentration — not at the world's density, but enough that volume could compensate for dilution. The ancient record had not excluded this substitution. His own derivation had not modeled it in sufficient detail to confirm or deny.

He had no candidate for this option.

The third path remained formally open and currently non-executable.

Dog Shit Luck Gu pulsed once.

Giant Sun checked the reading.

The Luck Suppression Heavenly Palace's passive monitoring function — which had tracked Fang Yuan's Heaven Refining output as an environmental variable for six weeks — had registered an anomaly in the external world's present timeframe. The refined output signature that indicated active Heaven Refining had ceased.

Fang Yuan had stopped.

He did not stop for resource depletion. His reserves were sufficient to sustain active refinement for months at his demonstrated cycle rate. He did not stop due to external pressure — no attack signature had registered against his aperture in this monitoring window. He had stopped because he had found something, and what he had found required extended calculation before any response was appropriate.

The cessation timestamp was eleven hours ago, external time.

Giant Sun filed the three paths and began recalculating under a revised assumption: Fang Yuan's deduction was already running, and its conclusion would alter at least one of the three options before it completed.

He did not know what Fang Yuan had found.

That gap in information was, at this moment, the most significant variable in the entire calculation.`
    },
  ];


  const chapterList = document.getElementById('chapterList');
  const chapterLabel = document.getElementById('chapterLabel');
  const chapterTitle = document.getElementById('chapterTitle');
  const chapterBody = document.getElementById('chapterBody');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let currentIndex = 0;

  function buildIndex() {
    chapters.forEach((ch, i) => {
      const li = document.createElement('li');
      li.dataset.index = i;
      li.innerHTML = `<span class="chapter-num">Chapter ${ch.number}</span>${ch.title}`;
      li.addEventListener('click', () => loadChapter(i));
      chapterList.appendChild(li);
    });
  }

  function loadChapter(index) {
    if (index < 0 || index >= chapters.length) return;
    currentIndex = index;
    const ch = chapters[index];

    chapterLabel.textContent = `Chapter ${ch.number}`;
    chapterTitle.textContent = ch.title;

    chapterBody.innerHTML = '';
    const paragraphs = ch.body.split(/\n\n+/);
    paragraphs.forEach(p => {
      const para = document.createElement('p');
      para.textContent = p.trim();
      chapterBody.appendChild(para);
    });

    [...chapterList.children].forEach((li, i) => {
      li.classList.toggle('active', i === index);
    });

    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === chapters.length - 1;

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  prevBtn.addEventListener('click', () => loadChapter(currentIndex - 1));
  nextBtn.addEventListener('click', () => loadChapter(currentIndex + 1));

  buildIndex();
  loadChapter(0);
</script>

</body>
</html>
