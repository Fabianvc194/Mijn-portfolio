   *     title:  "Chapter Title",   // string  — shown next to the number

   *   1. Copy the object block for Chapter 2335 below.
   *   2. Paste it into the `chapters` array, AFTER the existing entry

   *   3. Update `number` and `title`.
   *   4. Paste the chapter text between the backticks in `body`.
   *
   * Formatting rules for `body`:
   *   - Use a TEMPLATE LITERAL (backticks `...`), NOT regular quotes.
   *     This lets the text span multiple lines without escaping.

Above the Central Continent, Heavenly Court's grand defensive formation blazed with silver light. At its core, Star Constellation Immortal Venerable channeled the full power of her accumulated dao marks, sustaining the revival process without pause.

One had to know that what she was reviving was none other than Primordial Origin Immortal Venerable — the founder of Heavenly Court, the master of Reason Path, who had presided over the Immemorial Antiquity era. If this Venerable were to revive, the entire balance of the situation would overturn. Heavenly Court's advantage would snowball until nothing could stop it.

"Old friend," he said, without turning his head. "You arrived before me."

Fang Yuan stood one step behind Giant Sun's right. He was Heaven Refining Demon Venerable, a Rank 9 existence who had self-created his own path. It should be known that in all the history of the Gu world, no cultivator had ever walked this road before him. His expression showed nothing. His eyes were counting.

Seven outer layers. Three inner. A core sustained entirely by Star Constellation's own reserves. Every breath she holds this formation open, Heavenly Court's advantage compounds. Every breath I delay, my Heaven Refining erodes under her divination. Every breath Giant Sun stands beside me, his luck complicates my calculations.

A cold certainty surfaced in his mind: good. Those six were built to be seen and eliminated. The two that remained were the ones built to survive her sight.

Giant Sun pressed the scar again. This time Star Constellation was a fraction of a breath slower in her counter. Fairy Zi Wei stepped forward. A silver thread passed from the elder Venerable's sleeve into the younger's palm. In the outer ring, a rank 8 Gu Immortal went silent. Three more took its position.

This thought settled into Fang Yuan's calculations with the weight of a confirmed conclusion.

He moved again.

This time, Heaven Refining did not reach for the silver threads. It reached for the names of the threads. Every dao mark at the Venerable level carried a designation in the world's fundamental register — a name that told existence what that mark was and what function it performed. Heaven Refining could refine that name. For three breaths, the first outer layer lost its self-knowledge. Silver threads unspooled into a nameless void that Heaven's Will had no category for.

Just then, Giant Sun pressed the third inner layer again. This time Star Constellation had to divert her full attention to the counter.

Fairy Zi Wei held the outer rings alone.

At this moment, Fang Yuan activated Luck Path Sovereign Immortal Gu.

It should be known that this was one of the rarest Sovereign Immortal Gu in existence, capable of directly influencing the fundamental currents of fortune itself. Fang Yuan directed it precisely. From Giant Sun's accumulated luck reservoir — built and refined over ten thousand years of infallible fortune — he withdrew a single measured degree.

In an ordinary century, such a withdrawal would never register. In the next Venerable-level exchange of weight, it would be the difference between a technique that landed at the perfect angle and a technique that landed at a slightly imperfect one.

The gap between those two outcomes, at the Venerable level, was everything.

At the outer ring's edge, Duke Long stood with both fists clenched. Feng Jiu Ge stood still nearby, fortune unspent. Neither moved. At this scale, their movement would have accomplished nothing. They were present the way walls are present during a conversation — structural, necessary, not participants.

Giant Sun's expression showed nothing.

Then, for exactly one breath, at the corner of his mouth, something appeared. It had no name in the vocabulary of an Infallible Ancient Venerable. It lasted one breath and disappeared.

Fang Yuan recorded it.

In the formation's core, Star Constellation was spending Sovereign Immortal Gu essence. This could not be seen with ordinary sight. At Venerable level, it could be heard — a slight flattening of the resonance she projected against the world, a lower note in her qi. She was paying heavily to hold the inner layers while Giant Sun's peak technique dug into the third.

Suddenly, Primordial Origin stirred.

One eye opened.

Every dao mark within a thousand li shifted its orientation by a fraction to face that eye. Heaven Refining's effective radius contracted. Wisdom Path's calculations flickered once before stabilizing.

A half-awake Venerable, a thought surfaced in Fang Yuan's mind, is more dangerous than a sleeping one and less dangerous than a waking one. The only reason it is manageable at all is that there is still a window to interfere.

He looked at Giant Sun.

Giant Sun was already looking at him.

Neither spoke. Both calculated the same sequence.

Giant Sun committed his peak technique.

Time Path at its absolute ceiling — not a disagreement with causality's preferred sequence but a wholesale replacement of it. A declaration that a different sequence of moments was correct. The essence cost was beyond what most Venerables could accumulate in a century. Giant Sun paid it in one breath. His luck converted the price to a fraction of its true weight.

Star Constellation shielded Primordial Origin's opening eye with her own body.

The third inner layer scarred deeply. The eye pressed against the shield. Star Constellation absorbed the overflow into herself and did not fall.

Just then, Fang Yuan refined the second outer layer.

He applied the same technique he had used on the first — Heaven Refining reaching not for the threads but for their names. The second outer layer lost itself. Silver unspooled.

The thread connecting Star Constellation's sleeve to the revival's core stuttered.

Primordial Origin's eye closed.

The door simply had insufficient force holding it open. The world, which had always wanted it shut, pulled it most of the way closed. The revival did not collapse. It suspended.

Star Constellation spoke one word.

"Hold."

Fairy Zi Wei stepped into the core's support position. A second Sovereign Immortal Gu — subordinate to the primary, but real — turned in her palm. The outer formation stabilized. The revival held in suspension.

Giant Sun exhaled.

In Venerable terms, an exhaled breath carried meaning. He had committed his peak technique and received a scar rather than a fracture. The third inner layer held. Primordial Origin slept. They had both spent an enormous amount of essence for a shared result — stalemate.

"Withdraw," Giant Sun said.

"Yes," Fang Yuan said.

They withdrew.

Behind them, Star Constellation remained standing. Fairy Zi Wei already held half of what the elder Venerable had once held alone. Duke Long stood exactly where he had stood at the exchange's beginning. Feng Jiu Ge had not moved once. His fortune remained unspent.

At this scale, it had not been needed.

Primordial Origin slept in his suspended core. Bing Sai Chuan remained alive somewhere in the outer ring.

Fang Yuan noted the second fact. It would need to be addressed.

Heaven's Will watched the two demons withdraw and made a quiet adjustment to its own plans. One degree of luck had left the Infallible Ancient Venerable. The Infallible had registered it one breath too late.

Fang Yuan walked away from Heavenly Court's perimeter. Two Venerables had spent more than he had for the same result. And one of them had paid a degree of luck that would only be noticed at the exact moment it changed the outcome of everything.

Acceptable.`

      body: `The rank 8 immortal whose name was Xu Hao died at the third contraction.

He did not die dramatically. He did not die with a final technique, or a vow, or a word spoken to anyone who would remember it. He stood in his assigned position in Heavenly Court's third outer ring, feeding essence into the array the way he had been feeding it for six days, and then the array contracted — Star Constellation folding five layers into four — and the structural demand multiplied by a factor he had not been told to expect, and his aperture gave what was asked of it, and then there was nothing left to give.

He was one of six.

The array absorbed them without pause. It did not know the difference between essence fed voluntarily and essence taken from a stopped heart. It knew only the arithmetic of its own maintenance, and the arithmetic was satisfied, and the silver threads continued their work.

Fairy Zi Wei noted the six. Added them to a count she had been keeping since the exchange began. She did not mourn. Mourning was a consumption she could not afford at present, and the rank 8s had known their function when they stood in the ring.

This was what it meant to serve Heavenly Court.

Duke Long felt the six deaths as a change in pressure.

The array used everyone in the ring as a distributed network; when six nodes died simultaneously, the remaining nodes absorbed the redistribution, and the redistribution landed in Duke Long's fists like a fist landing in his fists. He accepted it. His qi path had been cultivating that specific kind of acceptance for four hundred years.

What he could not accept was the view from the outer ring.

Two li. That was the distance to the perimeter. Two li of air and dao marks and the ambient overflow of a Venerable-tier exchange that was, even at this distance, enough to keep most rank 8s from advancing a single step. Duke Long was not most rank 8 immortals. He was, among rank 8 immortals, at the uppermost tier — not Venerable, not even close, but the uppermost tier of what was not Venerable. On another day, against another opponent, two li was not an insurmountable distance.

Today it was.

He could feel Fang Yuan's presence the way you feel a change in weather before you can name what is changing. A pressure. A slight wrongness in the way dao marks oriented themselves in any space the demon occupied. It was not intimidation — Duke Long did not, specifically, feel intimidated. He felt the rank difference as a physical fact, the way a man at the bottom of a deep lake feels the water above him: not as threat, but as weight, as an objective condition of his location.

His vow pulled at him like a hook set in his diaphragm.

The vow had been set for decades. He had taken it in a specific moment of cold clarity and he had never regretted it, not once, not in any of the ten thousand subsequent moments when it had pulled at him exactly like this. The vow was his axis. He had arranged his cultivation around it the way a building is arranged around a load-bearing wall.

The wall was pulling at him now and he could not move toward it.

Star Constellation had placed him in the outer ring because the outer ring needed him and because his judgment could not be trusted at this scale to move independently. He understood this. He even agreed with it, in the part of himself that was a general rather than a man with a vow. The part that was a man with a vow was not presently speaking loudly enough to override the part that was a general.

But it was speaking.

He tightened his hands around the essence threads feeding the array and watched the perimeter and was very still.

What did a Venerable exchange look like from two li away?

Not what the cultivators in the outer ring had imagined before they had stood here. Not light and thunder. Not the visible collision of dao marks. Not even movement, much of the time.

It looked, mostly, like nothing.

Two figures stood at the perimeter. One was very large. One was not. They did not move in ways that seemed significant. Occasionally a ripple passed through the air between them and the array — colorless, nearly invisible, the way heat shimmers above a hot surface — and somewhere in the outer ring an essence thread would spike and a rank 8 would drain faster than expected. Occasionally the sky above Heavenly Court would shift: not cloud movement, something deeper, the agreement-layer of the world briefly reorganizing, which the rank 8s felt as a pressure behind the eyes and a brief conviction that they had forgotten something important.

That was the Heaven's Will strike, someone had told Xu Hao, before Xu Hao died. The brief forgetting. That's what it feels like when something above your rank argues with your existence.

Xu Hao had not had the chance to verify this for himself.

The other thing that was visible was Star Constellation's back. She stood at the core, and she did not move, and she did not make sound, and she was so completely the fixed point of the array that looking at her was like looking at the base of a mountain: you could not tell from the outside whether it was still or simply too large to appear to move.

Fairy Zi Wei moved more. Small adjustments. A step in one direction, a reorientation of the secondary Sovereign Gu in her palm. She was easier to read, and reading her was the only available proxy for understanding what was happening at the scale above.

When Fairy Zi Wei tensed: something was being spent.

When Fairy Zi Wei's hand opened slightly: something had been absorbed.

When Fairy Zi Wei looked at the perimeter for longer than three seconds: one of the demons had moved.

Duke Long had been reading Fairy Zi Wei for six days. He had become, against his will, fluent in the language of her micro-adjustments. He noted each one without wanting to. He noted, now, that she had looked at the perimeter for four seconds, and then returned to her adjustment, and then looked again.

Something was being decided at the perimeter.

He did not know what. He did not have the perception to know what. This was its own particular frustration — not the frustration of a man blocked from acting, but the frustration of a man who cannot see clearly enough to know whether acting is even possible.

He stayed still. He fed the array. He watched Fairy Zi Wei's hands.

Feng Jiu Ge was not feeding the array.

This was a distinction that mattered less than it appeared. He was not feeding the array because Star Constellation had not placed him in an essence role. She had placed him in a fortune role, which was a different kind of resource entirely and one that could not be spent in the same way.

Fortune, at Feng Jiu Ge's tier, was not a vague concept. It had weight. It had capacity. It refilled over time, slowly, from sources that were difficult to fully enumerate — proximity to certain events, completion of certain actions, the compounding interest of a life lived in accordance with Heaven's Will's preferences. It could be spent in large amounts in single moments, or trickled out in small corrections over a long period. Star Constellation had, at the beginning of the exchange, given him very specific instructions about which of those two modes she required.

Wait, she had said. Your fortune is worth more unspent than spent. Do not spend it. Wait for the moment I indicate.

She had not indicated.

He was waiting.

This was not, for Feng Jiu Ge, an uncomfortable state. He had cultivated patience the way other immortals cultivated combat techniques — not as a secondary virtue but as a primary competency, because fortune did not respond well to impatience. Impatient men spent their fortune on the wrong moments. They saw an opportunity and seized it, and the fortune was real, but the opportunity was not the one that mattered, and they had spent the resource that would have mattered on the one that didn't.

He had made that error once. He had been at rank 6 and the error had cost him two decades of accumulated fortune and a cultivation bottleneck that lasted eleven years. He had not made the error again.

He stood in his position and felt his fortune the way a man feels his own heartbeat — not consciously, not effortfully, simply as the baseline texture of his existence — and he watched the perimeter.

The demon called Fang Yuan was standing at the perimeter.

Feng Jiu Ge had a considerable history with Fang Yuan. More than considerable. The kind of history that the Gu World, left to its own arithmetic, usually resolved one way or another within a century. It had not resolved. Fang Yuan had kept living and Feng Jiu Ge had kept living and the history between them had continued accumulating in the way that unresolved histories do: with interest.

He did not hate Fang Yuan. Hate was a simplification, and Feng Jiu Ge was not a simple man. He understood Fang Yuan as a principle in motion — a principle that was directly opposed to everything Feng Jiu Ge's existence was built on, not personally but structurally, the way a river opposes a dam not because it chooses to but because their geometries require it.

The fortune in his cultivation told him, in the wordless way that fortune communicated, that the geometry was not yet at its resolving point.

Wait.

He waited.

Long Hair Ancestor was the oldest rank 8 in the outer ring.

He was not the most powerful. He was not the most strategically significant. He was old enough that those categories had long since ceased to organize his sense of himself. He was old enough that he had watched three prior Venerables in Heavenly Court's history go from ascension to death, and he had been a rank 8 for all three of those lifetimes, and the specific flavor of inadequacy that came from being a rank 8 watching Venerables operate was by now so familiar he no longer experienced it as inadequacy.

He experienced it as weather.

He stood in the outer ring, the essence threads running through his hands as naturally as breath, and he watched the array do what arrays do when Venerables are using them: behave in ways that were, from a rank 8's vantage, only partially visible and only partially comprehensible, the way the deep structure of a mountain is only partially visible from its surface.

He had built the reserve array. The one tucked into the third geological layer of the region's terrain, woven during the three years of preparation before Fang Yuan's Rank 9 ascension, fed slowly and quietly with the particular patience that three hundred years of cultivation produced. It was complete. It had been complete for six months. He had not activated it and did not plan to activate it in this exchange, because the exchange did not yet require it.

He would know when the exchange required it.

He had been watching Star Constellation for long enough to know when she needed something without being told. The gift of very long service — you stopped needing explicit instructions and started reading the instruction implicit in the situation. The array's reserve was for a specific purpose, a purpose that would become clear at a specific moment, and the moment was not now.

He fed the array.

He noted, with the particular attention of a very old practitioner, that the array's demand had increased by the precise amount he had expected it to increase after six rank 8s died. His model of the array was accurate. His model of Star Constellation's restructuring was accurate. His model of how many more exchanges this configuration would sustain before requiring another contraction was, by his estimate, accurate.

He was, he reflected with the dry non-amusement of great age, very good at models.

What he was less good at — what no rank 8 had ever been good at, in his experience — was predicting what a Venerable would do with the space that the models created. You could model the array perfectly and still not know what Star Constellation would choose to do inside it. You could model the resource attrition perfectly and still not know at what point she would decide the cost had become acceptable.

The Venerables operated in the space between the models. That was what made them Venerables.

He looked at the perimeter.

The demon called Fang Yuan was still standing there. Still watching. Still appearing, to rank 8 perception, not to be doing anything of particular significance.

Long Hair Ancestor had watched Fang Yuan long enough to know that this appearance was the most dangerous thing about him.

In the outer ring, the remaining rank 8s fed the array.

Their essence moved in threads, silver and fine, from their apertures into the array's outer nodes, and from the outer nodes inward in a direction that was not quite geometric, not quite measurable from their position, toward Star Constellation at the core who was feeding it further in a direction they could not perceive at all. It was like being a stream that feeds a river that feeds a sea that feeds something beyond the sea that they did not have a word for.

Above them, at a remove that was not merely spatial, the Venerables held their silence.

At the perimeter, Fang Yuan turned his head slightly and looked at the outer ring.

He looked at it for approximately two seconds.

Then he looked away.

In those two seconds, he had completed a full revised inventory of the outer ring's composition, residual capacity, strategic disposition, and probable behavior over the next three exchanges. He had noted Duke Long's location, Feng Jiu Ge's non-essence role, Long Hair Ancestor's position relative to the reserve array Fang Yuan had already identified in the geological layer beneath the terrain.

He had noted all of this in two seconds and had found nothing that changed his current plan and had looked away.

The rank 8s in the outer ring were not a variable at this stage.

Not yet.`

      number: 2338,
      title: "A Falsified Certainty",
      body: `The deal had been struck in Chapter 2336.

Giant Sun would commit his next peak technique at the third inner layer, at the moment Fang Yuan indicated. In exchange, Fang Yuan had shared the location of the double-registration seam in the new outer layer's fourth node.

It was, on its surface, an equitable arrangement.

On its surface.

Fang Yuan ran the Wisdom Path model for the fourteenth time in six hours, not because the result had changed but because the fourteenth run confirmed that the result had not changed, and a confirmed result was worth more than a single result. His Wisdom Path Sovereign Immortal Gu processed the array's observable data — the visible essence-flow rates, the geometry of the contracted layers, the rhythm of rank 8 deaths in the outer ring, the specific counter-resonance Star Constellation had woven into the new outer layer's fabric — and arrived, again, at the same conclusion.

Primordial Origin would not approach critical consciousness for another three months. Possibly four.

Star Constellation had bought herself that time by contracting the array. The revival was slower now. The inner layers fed the suspended body more carefully, more efficiently, less wastefully, and the sustained cost was lower even though the fortification cost was higher. It was a good trade. Fang Yuan would have made it himself.

Giant Sun did not know about the slowdown.

Giant Sun had probed the new outer layer in 2336 and had registered the counter-resonance and had noted the increased essence cost and had updated his model accordingly. His model was good, as luck-derived models of this depth tended to be. But his model had a gap in it — the gap corresponding to information he had not had the angle to observe. He did not know that the revival's interior timeline had shifted. He knew the array was stronger at the surface. He did not know that the surface's new strength had been purchased by slowing the engine underneath.

From Giant Sun's information state, the revival was proceeding at its previous rate.

From Giant Sun's information state, the compact outer array was not a defensive pivot but a temporary fortification — a reinforcement against the first exchange's pressure, after which the revival would continue at its original pace.

From Giant Sun's information state, the critical consciousness window for Primordial Origin was still within the original estimate. Three to four more exchanges, depending on how much the inner layers were being pushed.

From Giant Sun's information state, a moment of urgency would come.

The entire structure of the false certainty was built on that gap.

Fang Yuan did not need to fabricate the information.

This was the important part — the part that distinguished what he was doing from simple deception. Simple deception could be felt, sometimes, by a being as old and luck-saturated as Giant Sun. Giant Sun had survived ten thousand years partly through the luck that warned him when things were wrong, and a fabricated lie had a texture that the luck could occasionally detect, especially when the lie was aimed directly at him in high-stakes conditions.

What Fang Yuan constructed instead was a valid inference from incomplete premises.

He took Giant Sun's information state — which he had modeled precisely — and he ran it through Wisdom Path Sovereign. What would a genuine Wisdom Path analysis of that information state conclude? What certainty would it derive from those premises?

The answer was: that Primordial Origin would approach critical consciousness in approximately three breaths of Venerable time.

This was what Giant Sun's own analysis, if he had Wisdom Path Sovereign, would have told him. It was the correct conclusion from the available data. It was wrong only because the data was incomplete — because the variable that corrected it, the interior timeline slowdown, was a variable Giant Sun did not have.

Fang Yuan packaged this analysis as an output of his Wisdom Path Sovereign and transmitted it to Giant Sun by the method they had established in their deal: a single Wisdom Path pulse, brief, at the frequency of genuine certainty.

He did not lie.

He shared a truth.

The truth was simply a truth built on incomplete information, transmitted at a moment when Giant Sun had no way to check the missing variable, by someone who knew exactly what the missing variable was and had chosen not to mention it.

Giant Sun received the pulse.

His luck processed it in the half-breath that luck used to process things: a rapid, intuitive assessment that asked not is this accurate but does this serve me. The luck said: act. The luck said: the window is now. The luck did not say: your ally has been modeling your information gaps for six hours.

The luck was, by one degree, less sharp than it had been a day ago.

He committed.

Time Path at peak — the overwriting-of-moments, the technique that replaced causality's preferred sequence with his own. It unfolded at the third inner layer, as specified. The cost was what it had always been for peak techniques: enormous. The essence left his aperture at a rate that would have emptied a rank 8 in a single breath and emptied even Giant Sun with a feeling that was not quite discomfort but was the nearest thing to discomfort that infallibility could produce.

The third inner layer screamed.

Not literally. Dao marks did not scream. But the disruption of a Venerable-peak Time Path technique against a Star-Path array at this depth created a resonance that passed through the world's register like a frequency through water — visible to Venerables as a kind of wrongness, a cascade of disagreements spreading outward from the impact point. The rank 8s in the outer ring felt it as a sudden weightlessness followed by a sudden heaviness.

Star Constellation turned.

Not her body — her attention. Her full Venerable attention, which was a different thing from her body's orientation, rotated from the outer array to the third inner layer to meet Giant Sun's technique.

This was what Fang Yuan had needed.

In the interval between Star Constellation turning her attention and her beginning to formulate the counter — a gap of roughly one third of a breath, impossible for any being below Venerable tier to exploit, barely possible for a Venerable with a prepared technique — Fang Yuan moved.

Heaven Refining Path reached across the contracted array to the fourth node of the new outer layer.

The double-registration was there precisely where he had told Giant Sun it was. The seam between the original node name and the new name Star Constellation had applied in the contraction. The seam was small — a crack in a wall rather than a gap in a wall. But Heaven Refining did not need a gap. Heaven Refining needed only a place where a name had been applied imperfectly.

He reached into the seam and took.

Not the whole name. He did not have the interval for the whole name. He took a syllable — in the abstract sense that dao mark names had syllables, which they did, at this resolution of analysis — a syllable that was enough to create an ambiguity in the layer's self-identification.

The layer, for two breaths, did not know precisely what it was.

Silver threads in the second outer layer stuttered.

The second outer layer's structural integrity dropped by a calculable fraction. Not collapsed — not yet. Dropped. Made uncertain. Made vulnerable to a following technique that knew where to press.

Star Constellation's counter landed on Giant Sun's third inner layer technique. The impact was audible, at Venerable tier, as a deep note that was not sound. The third inner layer scarred — less deeply than it had scarred in the previous exchange, because Star Constellation was now attending to it fully. Giant Sun's technique had spent a peak's worth of essence for a scar rather than a fracture.

Fang Yuan filed the difference.

Giant Sun withdrew. The technique was spent. His peak commit for this exchange was gone, used, absorbed.

Star Constellation did not file the difference.

She had noticed it already. She had noticed it four-fifths of a breath before it completed.

Divination Path Sovereign processed events in a temporal direction that was not quite the same as the temporal direction in which events happened — a slight forward lean, a perpetual marginal preview. This preview was not prophecy. It could not see far. But it could see the immediate future with a clarity that was, in close combat, equivalent to having already experienced it once.

She had seen Giant Sun's commitment before it landed.

She had seen, in the same instant, the information pulse Fang Yuan had sent to trigger it.

She had, in the following instant, seen the seam in her own fourth node's double-registration — a seam she had been aware of, a seam she had planned to correct in the following maintenance cycle, a seam she had calculated carried acceptable risk because the maintenance cycle was scheduled before any plausible enemy reach.

She had been wrong about the timing.

The maintenance cycle was not before the reach. The reach was now. Fang Yuan had found the seam in the interval between her attention turning and her counter forming, and she had not been able to redirect in time because she had been occupied with a peak technique she had been manipulated into prioritizing.

She understood the full structure of what had happened, in the one-third of a breath she had available to understand it, with the complete clarity of ten thousand years of intelligence applied at maximum output.

And she could do nothing about it.

Her counter landed. Giant Sun's technique was absorbed. The third inner layer held. The second outer layer was compromised, slightly, temporarily, pending a following technique that would press the ambiguity she had just been handed.

She began repairing the fourth node's seam.

She calculated how long it would take.

She calculated whether Fang Yuan would press the second outer layer's ambiguity before the seam was repaired.

She calculated the likelihood that he would wait.

The calculation resolved in three quarters of a breath.

She began moving Fairy Zi Wei into position.

Giant Sun returned to the perimeter.

His peak technique was spent. The third inner layer had a scar. The exchange had proceeded approximately as expected, from his model's perspective. Slower progress than the equivalent technique in the previous exchange, but progress. The array was weaker at the third inner layer. The revival remained under pressure.

He stood beside Fang Yuan and felt, in the vague way that intuition at his tier operated, that something had been slightly off about the timing of the indication. Not wrong. Not impossible. Simply: if he had waited another half-breath, his angle on the third inner layer would have been marginally better.

He did not say this.

He looked at the outer array and saw, without Fang Yuan saying anything about it, that the second outer layer had acquired a slight instability. An ambiguity in its self-identification that had not been present before Giant Sun's technique had drawn Star Constellation's attention.

He looked at this for a moment.

"The second outer layer," he said.

"Yes," Fang Yuan said.

"You moved during my commit."

"Yes," Fang Yuan said.

The confirmation was immediate, complete, and uninflected. It was the response of a man who had not done anything he considered worth concealing. Not because he had nothing to conceal — he had a great deal to conceal — but because the specific act of moving during Giant Sun's commit was not the thing that needed concealing. Giant Sun had seen it. Denying it would cost credibility for no gain.

Giant Sun was quiet for a moment.

"The indication," he said. "Was it accurate."

"It was a genuine Wisdom Path analysis of your information state," Fang Yuan said.

Another silence.

This was, Fang Yuan knew, the most precise true statement available to him. It was also the most complete concealment available to him. The silence that followed it was Giant Sun processing the distinction between a genuine analysis of your information state and a genuine analysis of the actual state. The distinction required knowing what Giant Sun's information state lacked. Giant Sun did not know what it lacked.

He could suspect.

Suspicion without evidence, at this tier, was worse than useful.

"You have the second outer layer's ambiguity," Giant Sun said at last. Not a question.

"For two exchanges. After that, she will have repaired the seam."

"And in two exchanges?"

"I will press it once," Fang Yuan said. "You will press the third inner layer again. Not a peak technique. A sustained application."

"A sustained application costs more per result than a peak."

"A sustained application cannot be absorbed by a single counter. She will have to split attention." Fang Yuan paused. "She has already begun moving Fairy Zi Wei into a supplementary position. Two simultaneous pressure points will exceed Fairy Zi Wei's current capacity to assist."

Giant Sun looked at the array. At Fairy Zi Wei's repositioning, which was visible to Venerable perception as a slight shift in the secondary Sovereign Gu's orientation.

"You are very thorough," Giant Sun said.

"I am accurate," Fang Yuan said. "Thoroughness implies excess. I do not exceed what is necessary."

Giant Sun's smile appeared — the small private one.

"You are accurate," he agreed, in a tone that was not agreement.

Above Heavenly Court, the array breathed in its new configuration.

The second outer layer held, compromised, uncertain of its own name at the fourth node for approximately two exchanges more. Star Constellation worked the repair with the focused efficiency of ten thousand years of array architecture, feeding it through Fairy Zi Wei's newly supplemented channel to keep the repair's essence cost from reaching her own core reserve.

In the outer ring, the rank 8s fed the threads.

Duke Long stood in his position and felt the ripple of Giant Sun's spent peak technique in the array's redistribution and adjusted the flow of his essence to compensate and watched the perimeter and said nothing.

Feng Jiu Ge stood in his position and said nothing and waited and felt his fortune the way a man feels his own heartbeat.

Long Hair Ancestor stood in his position and began, in the quiet mathematics of very old practice, running a revised estimate of how many exchanges remained before his reserve array would be needed.

He revised the estimate downward by one.`

  const chapterList = document.getElementById('chapterList');
  const chapterLabel = document.getElementById('chapterLabel');
  const chapterTitle = document.getElementById('chapterTitle');
  const chapterBody = document.getElementById('chapterBody');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let currentIndex = 0;

  function buildIndex() {
    chapters.forEach((ch, i) => {
      const li = document.createElement('li');
      li.dataset.index = i;
      li.innerHTML = `<span class="chapter-num">Chapter ${ch.number}</span>${ch.title}`;
      li.addEventListener('click', () => loadChapter(i));
      chapterList.appendChild(li);
    });
  }

  function loadChapter(index) {
    if (index < 0 || index >= chapters.length) return;
    currentIndex = index;
    const ch = chapters[index];

    chapterLabel.textContent = `Chapter ${ch.number}`;
    chapterTitle.textContent = ch.title;

    chapterBody.innerHTML = '';
    const paragraphs = ch.body.split(/\n\n+/);
    paragraphs.forEach(p => {
      const para = document.createElement('p');
      para.textContent = p.trim();
      chapterBody.appendChild(para);
    });

    [...chapterList.children].forEach((li, i) => {
      li.classList.toggle('active', i === index);
    });

    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === chapters.length - 1;

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  prevBtn.addEventListener('click', () => loadChapter(currentIndex - 1));
  nextBtn.addEventListener('click', () => loadChapter(currentIndex + 1));

  buildIndex();
  loadChapter(0);
</script>
