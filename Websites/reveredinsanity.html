<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reverend Insanity — Fan Continuation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: #1a1a1a;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  .header {
    text-align: center;
    padding: 2rem 1rem 1.5rem;
    border-bottom: 1px solid #2a2a2a;
  }

  .header h1 {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 2.5rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #f0e6d2;
    margin-bottom: 0.3rem;
  }

  .header .subtitle {
    font-size: 0.95rem;
    color: #9a9a9a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 2rem;
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .sidebar {
    border-right: 1px solid #2a2a2a;
    padding-right: 1.5rem;
    position: sticky;
    top: 1rem;
    align-self: start;
    max-height: calc(100vh - 2rem);
    overflow-y: auto;
  }

  .sidebar h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #888;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #2a2a2a;
  }

  .chapter-list {
    list-style: none;
  }

  .chapter-list li {
    padding: 0.6rem 0.8rem;
    margin-bottom: 0.25rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    color: #bdbdbd;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    border-left: 3px solid transparent;
  }

  .chapter-list li:hover {
    background: #242424;
    color: #f0e6d2;
  }

  .chapter-list li.active {
    background: #2a241a;
    color: #f0e6d2;
    border-left-color: #c9a961;
    font-weight: 600;
  }

  .chapter-num {
    display: block;
    font-size: 0.75rem;
    color: #888;
    letter-spacing: 0.1em;
    margin-bottom: 0.15rem;
  }

  .chapter-list li.active .chapter-num {
    color: #c9a961;
  }

  .reader {
    min-width: 0;
  }

  .reader h2.chapter-title {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 2rem;
    color: #f0e6d2;
    margin-bottom: 0.3rem;
    line-height: 1.25;
  }

  .reader .chapter-label {
    font-size: 0.8rem;
    color: #c9a961;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1.5rem;
  }

  .chapter-body {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 1.08rem;
    line-height: 1.85;
    color: #e8e8e8;
  }

  .chapter-body p {
    margin-bottom: 1.2rem;
    text-align: justify;
  }

  .chapter-body p:first-of-type::first-letter {
    font-size: 2.8rem;
    font-weight: 600;
    float: left;
    line-height: 1;
    padding: 0.25rem 0.5rem 0 0;
    color: #c9a961;
  }

  .nav-buttons {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid #2a2a2a;
  }

  .nav-btn {
    flex: 1;
    padding: 0.85rem 1.25rem;
    background: #242424;
    color: #e8e8e8;
    border: 1px solid #333;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .nav-btn:hover:not(:disabled) {
    background: #2a241a;
    border-color: #c9a961;
    color: #f0e6d2;
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .nav-btn.next { text-align: right; }
  .nav-btn.prev { text-align: left; }

  @media (max-width: 768px) {
    .header h1 { font-size: 1.8rem; }
    .header .subtitle { font-size: 0.8rem; }
    .layout {
      grid-template-columns: 1fr;
      gap: 1rem;
      padding: 1rem;
    }
    .sidebar {
      position: static;
      border-right: none;
      border-bottom: 1px solid #2a2a2a;
      padding-right: 0;
      padding-bottom: 1rem;
      max-height: 240px;
    }
    .reader h2.chapter-title { font-size: 1.5rem; }
    .chapter-body { font-size: 1rem; line-height: 1.75; }
    .chapter-body p:first-of-type::first-letter { font-size: 2.2rem; }
  }
</style>
</head>
<body>


<header class="header">
  <h1>Reverend Insanity</h1>
  <div class="subtitle">Fan Continuation — Chapter 2335+</div>
</header>

<main class="layout">
  <aside class="sidebar">
    <h2>Chapters</h2>
    <ul class="chapter-list" id="chapterList"></ul>
  </aside>

  <section class="reader" id="reader">
    <div class="chapter-label" id="chapterLabel"></div>
    <h2 class="chapter-title" id="chapterTitle"></h2>
    <div class="chapter-body" id="chapterBody"></div>

    <div class="nav-buttons">
      <button class="nav-btn prev" id="prevBtn">&larr; Previous Chapter</button>
      <button class="nav-btn next" id="nextBtn">Next Chapter &rarr;</button>
    </div>
  </section>
</main>

<script>
  /* ============================================================
   * HOW TO ADD A NEW CHAPTER
   * ============================================================
   *
   * Each chapter is a plain JavaScript object with three fields:
   *
   *   {
   *     number: 2336,              // integer — shown as "Chapter 2336"
   *     title:  "Chapter Title",   // string  — shown next to the number
   *     body:   `Full chapter text...`  // template literal (backticks)
   *   }
   *
   * Steps:
   *   1. Copy the object block for Chapter 2335 below.
   *   2. Paste it into the `chapters` array, AFTER the existing entry
   *      (keep chapters in ascending order — the list renders them
   *      in array order).
   *   3. Update `number` and `title`.
   *   4. Paste the chapter text between the backticks in `body`.
   *
   * Formatting rules for `body`:
   *   - Use a TEMPLATE LITERAL (backticks `...`), NOT regular quotes.
   *     This lets the text span multiple lines without escaping.
   *   - Separate paragraphs with a BLANK LINE (one empty line between
   *     paragraphs). The renderer splits on blank lines and wraps each
   *     chunk in a <p> tag automatically — do NOT add <p> tags yourself.
   *   - Do NOT use raw backticks inside the text. If the chapter needs
   *     one, escape it as \` or swap for a different character.
   *   - Plain quotes ("..." and '...') are fine and need no escaping.
   *   - HTML in the text is rendered as literal text (safe by default),
   *     so "<sigh>" will show as <sigh>, not as a tag.
   *
   * The UI updates automatically when you add entries — no other code
   * changes are needed. The sidebar index, prev/next buttons, and
   * active-chapter highlighting all derive from this array.
   *
   * Example of adding two chapters:
   *
   *   const chapters = [
   *     { number: 2335, title: "A Triangle Contracts", body: `...` },
   *     { number: 2336, title: "The Ledger Opens",     body: `...` },
   *     { number: 2337, title: "One Degree Missing",   body: `...` }
   *   ];
   *
   * ============================================================ */

  const chapters = [
    {
      number: 2335,
      title: "The Harvest of Silence",
      body: `Above the ravaged crown of Heavenly Court, in the unstable space that had once been spectral heaven, Fang Yuan stood with a cold expression.

He did what he always did in the breath before a killer move — he counted.

Three rank nine immortal essences gone to the compound activation of Shocking Departure of Year Dream Wave and Dang Hun Sound. Two more consumed by Arrival of Dragon Snake with Dust Fog and Explosive Soul Wind. One further immortal essence spent simply to hold his position, for the ambient qi path dao marks released by the earlier explosion pressed against him from every direction, turbulent as a second sky.

Six immortal essences expended.

Not wasted. Invested.

But the sovereign immortal body was a hungry body, and the sovereign immortal aperture's internal time flow exceeded any other aperture in existence. Every breath here was a breath of production shortfall. Every compound killer move was a withdrawal from reserves he could not replenish in the middle of battle.

"At this rate, I can sustain seven more exchanges of this scale before I must consider withdrawal," Fang Yuan calculated inwardly. "No more than that."

Around him, the battlefield settled into its true configuration.

Star Constellation held the center. Wounded. Pale. A thin track of blood traced the corner of her mouth, where she had absorbed the greater portion of the qi harvest fruit's explosive force. Her stardust bandages still held about the damaged core — one hundred nested layers of starlight standing between him and his target. To her left, Spectral Soul raged inside the star fog, and did not stop raging.

Three li to Fang Yuan's right, Giant Sun Immortal Venerable stood blazing.

That was what most observers would see — Giant Sun radiating golden luck, an unshakable pillar of Northern Plains authority.

Fang Yuan saw something else.

"His luck pillar is dimmer than it ought to be. He activated I Reside In All Living Beings And Heaven And Earth twice in these past exchanges. The surface luck path dao marks have recovered. The underlying foundation has not. A torch burning its own handle."

He filed the observation away. His face revealed nothing. He did not speak.

"Heaven Refining Demon Venerable." Star Constellation's voice carried no trace of fear — only the clarity of one who had already calculated every outcome and accepted the worst. "You threaten to slaughter Heavenly Court's immortals. Allow me to remind you: they are sheltered within Immortal Gu Houses. Each one you attempt to destroy costs you more than it costs me."

Fang Yuan's lips curved. It was not a warm curve. It was the expression of a craftsman noting the flaw in a competitor's work.

"Star Constellation Immortal Venerable," he replied — and his voice now carried the gentle cadence of Great Love Immortal Gu, measured and compassionate, shaped for the ears of the surviving sect immortals listening below — "you speak of costs. Then consider this: the cost of defending three fronts at once is a cost you are already paying."

Without announcement, he activated Stealing Heavenly Secret.

Heaven's will brushed against him — cool and disapproving as always — and within that contact, Fang Yuan read the fine structure of the battlefield's luck distribution. Star Constellation's star fog was indeed holding Spectral Soul. But the fog was thinner on its left flank. Her thoughts were weighted toward the qi harvest fruit core. And the wisdom path dao marks amplifying her through Heavenly Court's three-million-year infrastructure — dense, oceanic — were stretched across three simultaneous operations.

"Even a venerable has limits on concurrent thought," Fang Yuan concluded inwardly. "Her wisdom is her greatest strength. Divide it finely enough, and the arithmetic changes."

In The Legends of Ren Zu, it was written thus:

In the earliest days, Wisdom Gu presented Ren Zu with a lantern of complete sight. "With this," said Wisdom Gu, "you shall see all paths." Ren Zu raised the lantern high, and indeed he saw every road, every shadow, every stone, and every horizon. He was still looking when the road crumbled beneath his feet. For he who illuminates all paths equally walks none of them.

"Star Constellation's wisdom is her lantern," Fang Yuan thought coldly. "Today I shall give it too many paths to illuminate."

He moved.

Not toward the qi harvest fruit core. Not toward Star Constellation.

Toward the cluster of surviving Immortal Gu Houses below.

Giant Sun understood at once. He had not reached venerable status through patience alone.

Immortal killer move — Soft Gold Crashing Pillar!

Forty pillars of compressed luck-light descended upon the qi harvest fruit core, each one woven from the ambient luck Giant Sun had quietly been harvesting from the surrounding ruins since his arrival. The move was not in its most potent form — the earlier luck drain had seen to that — but forty simultaneous points of impact carried a different logic than raw force. They struck everywhere at once.

Star Constellation pivoted. Her star fog tightened around Spectral Soul. Her stardust bandages reinforced over the core. Two dozen wisdom path calculations swept into motion to intercept Giant Sun's pillars, at a speed no other mind in existence could match.

In doing so, she gave Fang Yuan the opening he had prepared for. A flash. A sliver of a breath.

More than enough.

Immortal killer move — Shocking Departure of Year Dream Wave and Dang Hun Sound!

Two rank nine immortal essences were consumed. The sequence ignited deep within his sovereign immortal aperture: dream armor Immortal Gu flared first, feeding dream path energy into the second Gu, then the third, cascading through nine Gu worms in sequence — each worm's output becoming the next worm's material — until the final activation produced the small phantom image of Dang Hun Mountain above Fang Yuan's head.

The mountain rang.

Ding——!

Ding——!

Pink sound waves rolled outward through the shattered halls of Heavenly Court — and passed through Star Constellation's star fog like water through silk.

Herein lay the nature of dream path at this moment. Star Constellation Immortal Venerable, the number one wisdom path cultivator in all of history, had no dream path counter-move prepared. She could endure the attack. She could resist it through sheer venerable resilience. But she could not block it.

The sound waves struck Spectral Soul within the fog. They struck the qi harvest fruit core's bandaging, and two outer layers degraded. They struck the wisdom path dao marks woven into Heavenly Court's infrastructure, and introduced a frequency those dao marks had never been designed to absorb.

Blood ran anew from the corner of Star Constellation's nose.

She had defended. Barely.

In the silence after the sound waves faded, Fang Yuan withdrew three li, and counted again.

Four compound moves remained before the calculus turned decisively against him. Giant Sun's luck pillar burned a fraction cooler than before — visible only to one who had been watching for it. Star Constellation stood between him and the qi harvest fruit core. Blood on her face. Three hundred parallel thoughts still running. Still unbroken. Still amplified by every wisdom path dao mark in a territory three million years in the making.

"She is extraordinary," he acknowledged inwardly, without admiration. "And she is alone."

Below, within the Demon Judgment Board, Qin Ding Ling coordinated Heavenly Court's survivors, moving the injured immortals into defensible positions. Fang Zheng relayed status reports outward. Zhao Lian Yun pressed herself against the inner wall of a half-collapsed Immortal Gu House. They were doing what wounded soldiers do — surviving.

Their presence complicated the mathematics. Their deaths would simplify it.

But Fang Yuan had not threatened to kill them because he intended to.

He had threatened them because Star Constellation needed to believe he might.

And she had.

He had watched the calculation flicker behind her dark pupils — the weight of her subordinates' survival delaying her response by a fraction of a thought at the critical instant. Not long. Not obvious. Just enough.

Compassion, in the end, was the most predictable weapon of all.

His gaze returned to the qi harvest fruit core. Blurred. Unstable. Still leaking qi path dao marks through one hundred layers of stardust cloth. He performed the final calculation of this exchange.

"At this pace, the core cannot endure three more rounds. She knows it. I know it. Giant Sun knows it. The only question remaining is what she intends to sacrifice to prevent the inevitable."

He allowed a smile to surface — and for the benefit of those watching from below, let it appear benevolent.

"Star Constellation Immortal Venerable," he called out, his Great Love voice warm as a cultivation hall at dawn, "even now, I offer you a path to peace. Surrender the core. Let Primordial Origin's revival end on its own terms. No further blood need be spilled today."

The words meant nothing. They were architecture — a frame that would make what came next appear, to history, to witnesses, to future scholars of this era, to have been her choice rather than his design.

She did not answer.

He had not expected her to.

"Those who see all paths," he thought, and his expression settled back into its customary cold stillness, "still have only two feet."`
    },
    {
      number: 2336,
      title: "Star Dao, Iron Net",
      body: `After the exchange, both demons withdrew to the perimeter.

Star Constellation did not pursue them. One had to know that pursuing Immortal Venerables was not her objective. Her objective had never changed — the revival of Primordial Origin Immortal Venerable. Everything else, including the damage the previous exchange had inflicted, was secondary.

She began rebuilding immediately.

It should be said that the standard method of repairing a broken defensive formation was to restore what had been lost. Star Constellation did not use the standard method. A dao mark name refined away by Heaven Refining Path could not simply be restored. It had been taken from the world's register, and the register did not return what Heaven Refining had absorbed.

"The first outer layer was refined at the name level," she said.

Fairy Zi Wei stood three steps behind her. "I observed."

"Then you know the standard counter does not apply. A taken name cannot be rebuilt. It can only be replaced with a new one." Star Constellation's hands moved through the formation's upper architecture. A dao mark rewrote its position in the register — not erased, migrated. "We do not rebuild the outer layer. We absorb it into the second."

Fairy Zi Wei was silent for a moment. "The second layer becomes the new outer. Exposed."

"And structurally distinct from what Heaven Refining has already consumed. He cannot apply the same technique twice to the same geometry." A thread shifted. "The formation contracts. Five layers become four. The revival slows."

"By how much?"

"Three months longer," Star Constellation said. "Possibly four."

Fairy Zi Wei did not ask whether this was acceptable. She already knew the answer. Star Constellation had decided before she began.

"The rank 8s," Fairy Zi Wei said instead.

"The outer ring will lose six more before the restructure is complete. The essence demand increases when layers merge." Star Constellation did not look at the outer ring. She did not need to look at things to account for them. "They understand their function."

At this moment, six rank 8 Gu Immortals in the outer ring went silent.

The formation absorbed them without pause. It did not distinguish between essence fed willingly and essence taken from a stopped heart. It knew only the arithmetic of its own maintenance. The silver threads continued without interruption.

Fairy Zi Wei noted the six. She did not mourn. Mourning was a cost she could not afford, and the rank 8s had known their function when they entered the ring. This was what it meant to serve Heavenly Court.

The formation contracted.

Five layers became four. The revival geometry compressed inward — slower, denser, harder to reach. The structure visible to Venerable perception shifted. What had been an open revival array became something fortified and closed, designed to endure rather than accelerate. Star Constellation had traded speed for resilience.

Fairy Zi Wei felt the weight change in her palm where the secondary Sovereign Immortal Gu rested. She adjusted. She was learning to carry what she would one day carry alone.

"He will test the new configuration," Fairy Zi Wei said.

"Giant Sun will," Star Constellation said. "He tests everything."

"And Fang Yuan?"

"Fang Yuan will watch Giant Sun test it first. He tests nothing he can learn from watching someone else test." A pause. "Position yourself to absorb the redistribution if the third inner layer is struck."

Outside, Giant Sun moved.

It should be known that Giant Sun Immortal Venerable, the Infallible Ancient Venerable and master of Time Path, had not survived ten thousand years by waiting longer than necessary. The new formation had to be tested. His luck would convert the test into useful information at lower cost than any alternative.

He reached forward with Time Path. Not a full technique — a probe. Light. Directed at the new outer layer.

The probe landed.

The layer held. More than held — it redirected. The Time Path frequency Giant Sun had used in the previous exchange arrived at the layer's surface and met a counter-resonance woven into the new structure. Star Constellation had anticipated his approach. The probe bounced.

Hmph. Giant Sun's eyes sharpened by a fraction. He sent a second probe, heavier, with a different frequency. This one made progress. The layer yielded slightly, then held.

The second probe cost seventeen units of essence.

In the previous exchange, a probe of equivalent depth had cost eleven.

Giant Sun withdrew both probes. He moved back to the perimeter without speaking. He adjusted his internal model of the formation with the particular adjustment that meant: the discount is smaller here. His infallible luck was not uniformly distributed. In this specific configuration, against this specific counter-resonance, the discount it provided was less than expected.

He filed the result.

At this moment, a thought surfaced in Fang Yuan's mind.

He had not needed Giant Sun's probe to complete his model of the new formation. He had built it from Star Constellation's hands during the restructure, from the pattern of rank 8 deaths, from the compression of the visible geometry, from seventeen variables cross-referenced by Wisdom Path Sovereign before the previous exchange had fully concluded. But Giant Sun's probe had added one thing his model had lacked: the counter-resonance's specific frequency.

Star Constellation had counter-woven specifically against Time Path.

She had not counter-woven against Heaven Refining.

It should be said that this was not an oversight. Star Constellation did not make oversights of this kind. She had chosen to prioritize the Time Path counter because Giant Sun committed peak techniques — sudden, enormous, requiring immediate response. Heaven Refining Path refined names, which was a slower and more patient threat. She could absorb name-refining gradually. She could not absorb a peak technique gradually.

She had prioritized correctly.

She had also, in prioritizing correctly, shown Fang Yuan exactly where the new layer's vulnerability now sat.

He stored this in his All-Encompassing True Meaning Gu and did not move. Moving now would cost him the element of surprise, and the element of surprise was worth more than an immediate strike.

Instead, he ran the attrition calculation.

Seventeen against eleven. A ratio one and a half times against Giant Sun — and that was only a probe. Star Constellation's deep reserves were the strongest on the board, accumulated over ten thousand years. But she had just added three months to the revival timeline. Three months of formation maintenance. Three months of rank 8 deaths. Three months of Heaven Refining quietly taking names from the new configuration.

Giant Sun's reserves were not the weakest in absolute terms. In effective terms they were, because his luck discount was now one degree smaller than yesterday. One degree compounded silently across exchanges. He would not feel it until it changed the result of a technique from success to failure.

The conclusion was simple.

Whoever spends first loses.

He had understood this as a principle for six days. He had now measured it in numbers. Numbers could be manipulated. Principles could not.

Fang Yuan looked at the formation.

Fairy Zi Wei was absorbing more weight. A structural node here. A thread there. She was ready to carry more than Star Constellation was currently giving her. Star Constellation was calibrating the transfer — not too fast, not too slow. She knew when she intended to step into the core. She was building toward that moment with the precision of ten thousand years of planning.

A thought surfaced in Fang Yuan's mind: the succession is already scheduled. Not because Star Constellation is weakening. Because she decided the outcome before the exchange began and is now executing it.

He revised his timeline estimate downward by two weeks.

Just then, Giant Sun spoke.

"The counter-weave. Specific to my last frequency." His voice was flat. "She adapted fast."

"She did not adapt," Fang Yuan said. "She anticipated. There is a difference."

Giant Sun looked at him. "The vulnerability. You've found it."

"It has a price."

"Name it."

"Your next peak technique," Fang Yuan said. "Third inner layer. At the moment I indicate."

A silence. "You want the timing."

"I want simultaneous pressure. When I take the vulnerability, the third layer must already be under attack. Otherwise she redirects her reserve to compensate and the window closes."

Giant Sun considered this for one breath. Just then, his gaze moved to the formation, running his own check.

"The vulnerability," he said.

"Fourth node of the new outer layer. She applied a replacement name over the original during the contraction and did not have time to fully resolve the overlap. The seam is small. Heaven Refining does not need it to be large."

"Agreed," Giant Sun said.

Fang Yuan noted the speed. A man with truly infallible luck would have located the vulnerability himself, given sufficient time. Giant Sun agreed quickly because quickly was cheaper than waiting. The luck drain from the previous exchange was already compressing his options, though he would not name it as such.

Neither of them acknowledged this.

"She intends to die in this formation," Giant Sun said. He was looking at Star Constellation's back. At the silver light on her sleeves. At Fairy Zi Wei three steps behind, absorbing the inheritance in careful doses.

"She decided that before this exchange began," Fang Yuan said.

"Hmph." Giant Sun's sound was brief. "Her plan does not require her survival."

"Only the succession's completion," Fang Yuan said. "That is harder to stop than a plan that requires survival."

Giant Sun said nothing further.

They stood at the perimeter. The formation breathed in its contracted configuration. Star Constellation's Divination Path eyes watched them from the core, reading ahead, measuring costs, calculating the specific point at which everything she had spent would become everything she had intended.

Fang Yuan did not move.

He was not idle.

He was calculating.`
    },
  ];


  const chapterList = document.getElementById('chapterList');
  const chapterLabel = document.getElementById('chapterLabel');
  const chapterTitle = document.getElementById('chapterTitle');
  const chapterBody = document.getElementById('chapterBody');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let currentIndex = 0;

  function buildIndex() {
    chapters.forEach((ch, i) => {
      const li = document.createElement('li');
      li.dataset.index = i;
      li.innerHTML = `<span class="chapter-num">Chapter ${ch.number}</span>${ch.title}`;
      li.addEventListener('click', () => loadChapter(i));
      chapterList.appendChild(li);
    });
  }

  function loadChapter(index) {
    if (index < 0 || index >= chapters.length) return;
    currentIndex = index;
    const ch = chapters[index];

    chapterLabel.textContent = `Chapter ${ch.number}`;
    chapterTitle.textContent = ch.title;

    chapterBody.innerHTML = '';
    const paragraphs = ch.body.split(/\n\n+/);
    paragraphs.forEach(p => {
      const para = document.createElement('p');
      para.textContent = p.trim();
      chapterBody.appendChild(para);
    });

    [...chapterList.children].forEach((li, i) => {
      li.classList.toggle('active', i === index);
    });

    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === chapters.length - 1;

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  prevBtn.addEventListener('click', () => loadChapter(currentIndex - 1));
  nextBtn.addEventListener('click', () => loadChapter(currentIndex + 1));

  buildIndex();
  loadChapter(0);
</script>

</body>
</html>
