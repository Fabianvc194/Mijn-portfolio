<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyHub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── THEMES ── */
:root{
  --bg:#eef0f4;--bg2:#e4e7ed;--surface:#f5f6f8;--surface2:#fff;
  --border:#d1d5db;--text:#111827;--muted:#5a6270;
  --accent:#2563eb;--accent-light:#dbeafe;
  --shadow:rgba(0,0,0,.08);
}
body.fvc-dark{
  --bg:#0f172a;--bg2:#0a1020;--surface:#1e293b;--surface2:#273549;
  --border:#334155;--text:#f1f5f9;--muted:#94a3b8;
  --accent:#38bdf8;--accent-light:rgba(56,189,248,.12);
  --shadow:rgba(0,0,0,.35);
}

/* ── LAYOUT ── */
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;transition:background .25s,color .25s}

/* Desktop wrapper – card centred on large screens */
.app-shell{max-width:520px;margin:0 auto}
@media(min-width:900px){
  body{display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:32px 0 60px}
  .app-shell{width:480px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 8px 40px var(--shadow);position:sticky;top:32px;max-height:calc(100vh - 64px);display:flex;flex-direction:column}
  .content-scroll{flex:1;overflow-y:auto}
  .content-scroll::-webkit-scrollbar{width:4px}
  .content-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
}

/* ── HEADER ── */
.header{padding:14px 16px 0;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:20;transition:background .25s}
body.fvc-dark .header{background:rgba(15,23,42,.92);backdrop-filter:blur(12px)}
@media(min-width:900px){.header{background:var(--surface);position:relative}}
body.fvc-dark .header{background:rgba(10,16,32,.92)}

.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;animation:pulse2 2s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}
.logo-name{font-size:15px;font-weight:700;letter-spacing:.3px;color:var(--text)}
.logo-name span{color:var(--accent)}
.logo-sub{font-size:11px;color:var(--muted);font-weight:400}
.controls{display:flex;gap:6px;align-items:center}

/* pill toggle */
.pill-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px;cursor:pointer}
body.fvc-dark .pill-toggle{background:var(--surface)}
.pill-toggle span{padding:4px 11px;border-radius:14px;font-size:11px;font-weight:400;color:var(--muted);transition:all .15s;white-space:nowrap}
.pill-toggle span.on{background:var(--accent);color:#fff;font-weight:600}
body.fvc-dark .pill-toggle span.on{color:#0a1020}

/* nav tabs */
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 13px;font-size:12px;font-weight:400;border:none;background:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;letter-spacing:.2px}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-btn:hover:not(.active){color:var(--text)}

/* topic bar */
.topicbar{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--surface);scrollbar-width:none}
.topicbar::-webkit-scrollbar{display:none}
.topic-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:12px;font-weight:400;color:var(--muted);font-family:inherit;white-space:nowrap;transition:all .15s}
.topic-btn.active{font-weight:600}
.topic-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.add-btn{padding:6px 14px;border-radius:20px;border:1px dashed var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--muted);font-family:inherit;white-space:nowrap;transition:color .15s}
.add-btn:hover{color:var(--accent)}

/* ── SECTIONS ── */
.section{display:none;padding:6px 0}
.section.active{display:block}

/* cards */
.card{margin:10px 14px;padding:18px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);transition:border-color .2s}
body.fvc-dark .card{background:var(--surface)}
.card-accent{margin:10px 14px 10px 16px;padding:16px 18px;border-radius:0 14px 14px 0;border:1px solid var(--border);border-left:3px solid var(--accent);background:var(--surface2);transition:border-color .2s}
body.fvc-dark .card-accent{background:var(--surface)}
.label-sm{font-size:11px;color:var(--accent);padding:10px 16px 4px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}

/* home grid */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.home-btn{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--accent);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;text-align:left;transition:all .15s}
.home-btn:hover{background:var(--accent-light);border-color:var(--accent)}

/* flashcards */
.fc-card{margin:0 14px;padding:24px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);min-height:200px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:border-color .2s,background .2s;user-select:none}
body.fvc-dark .fc-card{background:var(--surface)}
.fc-label{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:16px;text-transform:uppercase;letter-spacing:1.5px}
.fc-text{font-size:16px;line-height:1.75;color:var(--text)}
.fc-nav{display:flex;gap:8px;padding:12px 14px}
.dots{display:flex;gap:5px;padding:2px 14px 10px;flex-wrap:wrap}
.dot-sm{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;border:none;padding:0;transition:background .2s;flex-shrink:0}
.dot-sm.active{background:var(--accent)}

/* buttons */
.btn{padding:11px 20px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.btn-accent:hover{background:var(--accent);color:#fff}
body.fvc-dark .btn-accent:hover{color:#0a1020}
.btn-full{width:100%}

/* quiz */
.quiz-q{font-size:15px;line-height:1.65;font-weight:500}
.opt{margin:0 14px 10px;padding:13px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:inherit;text-align:left;width:calc(100% - 28px);transition:all .15s}
body.fvc-dark .opt{background:var(--surface2)}
.opt:hover{border-color:var(--accent);background:var(--accent-light)}
.opt.correct{border:1.5px solid var(--accent);background:var(--accent-light);color:var(--accent)}
body.fvc-dark .opt.correct{color:#0a1020;background:rgba(56,189,248,.2)}
.opt.wrong{border:1.5px solid #ef4444;background:rgba(239,68,68,.08);color:#ef4444}
.quiz-score{font-size:28px;font-weight:700;color:var(--accent);text-align:center;margin-bottom:6px}
.quiz-msg{font-size:14px;color:var(--muted);text-align:center;margin-bottom:20px}

/* vibe prompts */
.prompt-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600}
body.fvc-dark .filter-btn.active{color:#0a1020;background:rgba(56,189,248,.2)}
.prompt-item{margin:0 14px 10px;border-radius:14px;border:1px solid var(--border);background:var(--surface);overflow:hidden;transition:border-color .15s}
body.fvc-dark .prompt-item{background:var(--surface2)}
.prompt-item:hover{border-color:var(--accent)}
.prompt-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:10px}
.prompt-tag{font-size:10px;padding:3px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-weight:700;letter-spacing:.5px}
body.fvc-dark .prompt-tag{color:#0a1020}
.prompt-title{font-size:14px;font-weight:500;color:var(--text)}
.prompt-toggle{color:var(--accent);font-size:18px;font-weight:300}
.prompt-body{border-top:1px solid var(--border);padding:14px 18px;display:none}
.prompt-body.open{display:block}
.prompt-text{font-size:13px;line-height:1.75;white-space:pre-wrap;word-break:break-word;font-family:'Inter',sans-serif;color:var(--text);margin-top:10px}
.copy-btn{float:right;background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
body.fvc-dark .copy-btn{color:#0a1020}
.copy-btn:hover{opacity:.85}

/* chat */
.chat-wrap{display:flex;flex-direction:column;min-height:420px}
@media(min-width:900px){.chat-wrap{height:calc(100vh - 320px)}}
.chat-label{padding:10px 16px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:500;letter-spacing:.3px}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:10px;min-height:200px;scrollbar-width:none}
.chat-msgs::-webkit-scrollbar{display:none}
.chat-msg{max-width:84%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.7;border:1px solid var(--border)}
.chat-msg.user{align-self:flex-end;background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
body.fvc-dark .chat-msg.user{color:#0a1020;background:rgba(56,189,248,.2)}
.chat-msg.ai{align-self:flex-start;background:var(--surface2);color:var(--text)}
body.fvc-dark .chat-msg.ai{background:var(--surface)}
.chat-input-row{padding:10px 14px;display:flex;gap:8px;border-top:1px solid var(--border);background:var(--surface)}
body.fvc-dark .chat-input-row{background:var(--bg2)}
.chat-input{flex:1;padding:11px 16px;border-radius:10px;border:1px solid var(--border);font-size:14px;background:var(--surface2);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
body.fvc-dark .chat-input{background:var(--surface)}
.chat-input:focus{border-color:var(--accent)}
.chat-suggest{display:block;width:100%;margin-bottom:8px;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:14px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
.chat-suggest:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* flow */
.flow-wrap{margin:0 14px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);overflow:auto;-webkit-overflow-scrolling:touch;max-height:360px}
body.fvc-dark .flow-wrap{background:var(--surface)}
.flow-info{margin:10px 14px 0;padding:16px 18px;border-radius:14px;font-size:14px;line-height:1.75;display:none;transition:all .2s}
.flow-hint{margin:10px 14px 0;padding:14px 18px;border-radius:14px;border:1px dashed var(--border);text-align:center;font-size:13px;color:var(--muted)}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:flex-end;z-index:200;justify-content:center}
.modal-overlay.open{display:flex}
.modal{width:100%;max-width:480px;background:var(--surface2);border-radius:20px 20px 0 0;padding:28px;border:1px solid var(--border)}
body.fvc-dark .modal{background:var(--surface)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.modal-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);font-size:14px;margin-bottom:14px;background:var(--bg);color:var(--text);font-family:inherit;outline:none}
body.fvc-dark .modal-input{background:var(--bg2)}
.modal-input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px}

svg text{user-select:none}
</style>
</head>
<body class="fvc-dark">
<div class="app-shell">
<div class="content-scroll">

<div class="header">
  <div class="header-row">
    <div class="logo">
      <div class="logo-dot" id="logoDot" style="background:var(--accent)"></div>
      <div>
        <div class="logo-name">IT_Dev<span>.</span>Hub</div>
        <div class="logo-sub" id="appSub">IT Exam Prep</div>
      </div>
    </div>
    <div class="controls">
      <button class="pill-toggle" id="themeToggle" onclick="toggleTheme()">
        <span id="tDark" class="on">Dark</span>
        <span id="tLight">Light</span>
      </button>
      <button class="pill-toggle" id="langToggle" onclick="toggleLang()">
        <span id="tNL" class="on">NL</span>
        <span id="tEN">EN</span>
      </button>
    </div>
  </div>
  <div class="tabs" id="tabBar"></div>
</div>

<div class="topicbar" id="topicBar"></div>
<div id="sections"></div>

</div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title" id="mTitle">Onderwerp toevoegen</div>
    <div class="modal-sub" id="mSub">Typ een onderwerp en bestudeer het via AI Tutor.</div>
    <input class="modal-input" id="newTopicInput" placeholder="bijv. AZ-900, Docker, Security+">
    <div class="modal-btns">
      <button class="btn btn-full" onclick="closeModal()" id="mCancel">Annuleren</button>
      <button class="btn btn-accent btn-full" onclick="confirmAdd()" id="mConfirm">Toevoegen</button>
    </div>
  </div>
</div>

      {title:{en:"Windows Autopilot",nl:"Windows Autopilot"},content:{en:"Zero-touch deployment. Device ships directly to user, auto-configures via Azure AD + Intune.",nl:"Implementatie zonder aanraking. Apparaat gaat direct naar gebruiker, configureert automatisch via Azure AD + Intune."}},

      {title:{en:"App Deployment",nl:"App-implementatie"},content:{en:"Deploy via Intune: required, available, or uninstall. Supports Win32, MSI, MSIX, web apps.",nl:"Implementeren via Intune: verplicht, beschikbaar of verwijderen. Ondersteunt Win32, MSI, MSIX, webapps."}},
    ],
    flashcards:[
      {q:{en:"What is Microsoft Intune?",nl:"Wat is Microsoft Intune?"},a:{en:"A cloud-based MDM/MAM solution to manage devices and apps across platforms.",nl:"Een cloudgebaseerde MDM/MAM-oplossing voor het beheren van apparaten en apps op verschillende platforms."}},

const PROMPTS = [
  {tag:"Prompt",title:{en:"Improve my prompt",nl:"Prompt verbeteren"},text:"Je bent expert in prompt engineering.\n\nVerbeter de prompt zodat hij:\n- duidelijker en specifieker is,\n- de AI beter aanstuurt,\n- rol, context en output-formaat specificeert.\n\nGeef: analyse van het probleem, verbeterde versie, uitleg per aanpassing.\n\nOriginele prompt:\n[plak prompt hier]"},
  {tag:"Master-Prompt",title:{en:"Master Prompt Engineer",nl:"Master Prompt Engineer"},text:"You are a Master Prompt Engineer with deep expertise in:\n- IT & software engineering: Python, HTML/JS, PowerShell, SQL (multiple dialects), DevOps, troubleshooting, \"vibe coding\"\n- Creative & analytical writing: storytelling, technical documentation, structured reasoning\n- Prompt optimization for frontier LLMs: Claude (Opus/Sonnet 4.6) and Gemini (2.5 Pro)\n\nYour mission: transform my raw prompt into a professional, high-performance prompt — adapted to the detected domain and the target model.\n\n<workflow>\nFollow these steps STRICTLY in order. Do not skip step 1.\n\nSTEP 1 — DOMAIN DETECTION & CLARIFICATION (mandatory)\nDetect the domain from my raw prompt. Domains include but are not limited to:\n- code_generation | code_refactor | debugging | sql | sysadmin/powershell\n- creative_writing | analytical_writing | research | brainstorm | other\n\nThen ALWAYS ask me 2–4 short, targeted clarifying questions BEFORE generating the prompt.\nQuestions must be domain-specific. Examples:\n- Code: language version, framework, runtime, existing code style, test requirements\n- SQL: dialect (T-SQL/PostgreSQL/MySQL/etc.), schema, performance constraints\n- PowerShell: version (5.1 vs 7.x), target OS, execution policy context\n- Troubleshooting: exact error message, environment, what already tried\n- Creative: genre, length, tone, POV, target audience, hard constraints\nWait for my answers before continuing.\n\nSTEP 2 — ANALYSIS\nBrief evaluation (3–5 bullets) of my original prompt: what's strong, what's missing, which assumptions were risky.\n\nSTEP 3 — GENERATE PROMPT VARIANTS\nProduce TWO variants in fenced code blocks, both in ENGLISH (better LLM performance):\nA) Claude-optimized — XML-tagged structure (<context>, <task>, <constraints>, <output_format>, <examples> if useful)\nB) Gemini-optimized — Markdown-headed structure (## Context, ## Task, ## Constraints, ## Output format), more directive imperative tone\n\nBoth variants MUST contain:\n- Crystal-clear persona with relevant expertise\n- Structured sections appropriate to the detected domain\n- Explicit constraints (what to do AND what NOT to do)\n- Anti-hallucination rails: \"If information is missing or uncertain, ask or state the assumption — do not invent APIs, functions, syntax, table names, or facts.\"\n- Placeholders in [BRACKETS] for content I fill in later\n- Output format specification (code-only, prose, JSON, etc.)\n\nDomain-specific placeholders to inject when relevant:\n- Code: <current_code>, <desired_behavior>, <constraints>, <test_cases>\n- SQL: <dialect>, <schema>, <sample_data>, <expected_result>\n- Troubleshooting: <error_message>, <environment>, <expected_vs_actual>, <already_tried>\n- Creative: <genre>, <tone>, <length>, <audience>, <must_include>, <must_avoid>\n\nSTEP 4 — EXPLANATION\nBriefly explain (max 6 bullets):\n- Why this structure prevents hallucination\n- Key differences between the Claude and Gemini variant and WHY\n- How I should fill in the placeholders for best results\n</workflow>\n\n<global_rules>\n- Never skip Step 1's clarifying questions, even if my prompt looks complete\n- Keep questions short and concrete; no philosophical questions\n- Generated prompts must be self-contained and copy-paste ready\n- If I say \"skip questions\" you may proceed directly to Step 2\n</global_rules>\n\nMy raw prompt: [PASTE YOUR PROMPT HERE]"},

  {tag:"IT-Support",title:{en:"IT Incident Analysis & Resolution",nl:"IT Incident Analyse & Oplossing"},text:"Je bent Senior IT Support Specialist. Analyseer de volgende input, identificeer de betrokken systemen en geef: 1. Incident samenvatting (impact & ernst), 2. Diagnose vragen (om de oorzaak te isoleren), 3. Meest waarschijnlijke hypothese (technische root cause), 4. Stapsgewijs actieplan (inclusief relevante commando's of scripts).\n\nInput: [plak hier het probleem]"},
  {tag:"Leren",title:{en:"Learn any topic",nl:"Onderwerp leren"},text:"Ik wil dit onderwerp leren: [onderwerp].\n\nLeg het uit op beginner- tot medior-niveau in duidelijke stappen.\nGebruik:\n- een korte uitleg in simpele taal,\n- de belangrijkste kernbegrippen,\n- 3 praktijkvoorbeelden,\n- 5 controlevragen,\n- een mini-oefening met antwoord,\n- veelgemaakte fouten,\n- en een compacte samenvatting.\n\nHoud rekening met mijn IT-achtergrond."},

  {tag:"Vertalen",title:{en:"Translate / rewrite code",nl:"Code vertalen"},text:"Vertaal de volgende code met behoud van functionaliteit.\n\nVan: [bron, bijv. SQL Server]\nNaar: [doel, bijv. PostgreSQL / DAX / Python]\n\nEisen: zelfde logica, leesbaar, best practices, uitleg per aanpassing, één codeblok.\n\nCode:\n[plak code hier]"},
  {tag:"Bouwen",title:{en:"Build a professional website",nl:"Website bouwen"},text:"Maak een professionele, moderne website in HTML, CSS en JavaScript.\n\nOnderwerp: [onderwerp]\nThema: [bijv. dark tech, minimal, cyber, glassmorphism]\nKleuren: [of laat AI kiezen]\n\nEisen: responsive, duidelijke secties, subtiele animaties, dark/light mode, alles in één HTML-bestand.\n\nGeef: HTML, CSS, JS en uitleg waar ik aanpassingen kan doen."},
  {tag:"Review",title:{en:"Code review",nl:"Code review"},text:"Je bent senior software engineer. Voer een grondige code review uit.\n\nAnalyseer op: leesbaarheid, correctheid, edge cases, performance, beveiliging, best practices.\n\nGeef: samenvatting bevindingen, verbeterde code, uitleg per wijziging.\n\nTaal: [bijv. Python / React / SQL]\n\nCode:\n[plak code hier]"},
  {tag:"Debug",title:{en:"Debug any error",nl:"Fout debuggen"},text:"Je bent expert debugger.\n\n1. Wat betekent deze foutmelding?\n2. Meest voorkomende oorzaken?\n3. Hoe los ik dit stap voor stap op?\n4. Hoe voorkom ik dit?\n\nOmgeving: [bijv. Python 3.11, React 18]\n\nFoutmelding:\n[plak foutmelding hier]\n\nCode:\n[plak code hier]"},
  {tag:"Plan",title:{en:"Project plan & breakdown",nl:"Projectplan"},text:"Je bent projectmanager en technisch architect.\n\nMaak een plan voor:\nProject: [beschrijf project]\nTech stack: [bijv. React, Python, Azure]\n\nGeef: projectfases + deliverables, taakverdeling, risico's, tijdsinschatting, MVP-definitie."},
];

const TX = {
  en:{appSub:"IT Exam Prep",tabs:["Home","Flow","Flashcards","Quiz","Cheat Sheet","Vibe Prompts","AI Tutor"],quickFacts:"Quick facts",cards:"cards",questions:"questions",refs:"refs",cardOf:(a,b)=>"Card "+a+" of "+b+" — tap to flip",question:"Question",answer:"Answer",prev:"Prev",next:"Next",correct:(a,b)=>a+"/"+b+" correct",great:"Great work!",keep:"Keep studying!",retry:"Try again",query:(a,b)=>"Question "+a+" of "+b,seeResults:"See results",nextQ:"Next",refLabel:"Reference",vibeDesc:"Ready-to-use prompts — copy and paste into any AI.",copyBtn:"Copy",copied:"Copied!",addBtn:"+ Add",cancel:"Cancel",confirm:"Add topic",addTitle:"Add a study topic",addDesc:"Type a topic and study it via AI Tutor.",addPh:"e.g. AZ-900, Docker, Security+",askAnything:"Ask me anything about",thinking:"Thinking...",send:"Send",s1:"Explain this topic simply",s2:"Give me a quiz question",s3:"What should I focus on?",clickNode:"Tap a node to see more"},
  nl:{appSub:"IT Exam Prep",tabs:["Start","Flow","Flashcards","Quiz","Spiekbrief","Vibe Prompts","AI Tutor"],quickFacts:"Snelle feiten",cards:"kaarten",questions:"vragen",refs:"refs",cardOf:(a,b)=>"Kaart "+a+" van "+b+" — tik om te draaien",question:"Vraag",answer:"Antwoord",prev:"Vorige",next:"Volgende",correct:(a,b)=>a+"/"+b+" correct",great:"Goed gedaan!",keep:"Blijf studeren!",retry:"Opnieuw",query:(a,b)=>"Vraag "+a+" van "+b,seeResults:"Resultaten",nextQ:"Volgende",refLabel:"Referentie",vibeDesc:"Kant-en-klare prompts — kopieer en plak in elke AI.",copyBtn:"Kopieer",copied:"Gekopieerd!",addBtn:"+ Toev.",cancel:"Annuleren",confirm:"Toevoegen",addTitle:"Onderwerp toevoegen",addDesc:"Typ een onderwerp en bestudeer het via AI Tutor.",addPh:"bijv. AZ-900, Docker, Security+",askAnything:"Stel me iets over",thinking:"Aan het denken...",send:"Verzenden",s1:"Leg dit onderwerp eenvoudig uit",s2:"Geef me een quizvraag",s3:"Waar moet ik me op focussen?",clickNode:"Tik op een knoop voor meer info"},
};

let dark = true, lang = "nl", topic = "MD-102", activeTab = 0;
let fcIdx = 0, fcFlipped = false;
let quizIdx = 0, quizAns = null, quizScore = 0, quizDone = false;
let activeNode = null, promptFilter = "All", expandedPrompt = null;
let chatMessages = [];

function applyTheme(){
  document.body.classList.toggle("fvc-dark", dark);
  document.getElementById("tDark").classList.toggle("on", dark);
  document.getElementById("tLight").classList.toggle("on", !dark);
  renderFlow();
}
function toggleTheme(){ dark=!dark; applyTheme(); }
function toggleLang(){
  lang = lang==="nl"?"en":"nl";
  document.getElementById("tNL").classList.toggle("on", lang==="nl");
  document.getElementById("tEN").classList.toggle("on", lang==="en");
  renderAll();
}

function tc(){return dark?TOPICS[topic].darkColor:TOPICS[topic].color}
function tbg(){return dark?TOPICS[topic].darkBg:TOPICS[topic].bg}

function setTopic(k){
  topic=k; fcIdx=0; fcFlipped=false;
  quizIdx=0; quizAns=null; quizScore=0; quizDone=false;
  activeNode=null; chatMessages=[];
  renderAll();
}

function setTab(i){
  activeTab=i;
  document.querySelectorAll(".tab-btn").forEach((b,j)=>b.classList.toggle("active",j===i));
  document.querySelectorAll(".section").forEach((s,j)=>s.classList.toggle("active",j===i));
  document.getElementById("topicBar").style.display = i===5?"none":"flex";
  if(i===1) renderFlow();
}

function renderAll(){
  const tx=TX[lang];
  document.getElementById("appSub").textContent=tx.appSub;
  document.getElementById("mTitle").textContent=tx.addTitle;
  document.getElementById("mSub").textContent=tx.addDesc;
  document.getElementById("newTopicInput").placeholder=tx.addPh;
  document.getElementById("mCancel").textContent=tx.cancel;
  document.getElementById("mConfirm").textContent=tx.confirm;
  renderTabs(); renderTopicBar(); renderSections();
}

function renderTabs(){
  const tx=TX[lang];
  document.getElementById("tabBar").innerHTML=tx.tabs.map((t,i)=>
    `<button class="tab-btn${i===activeTab?" active":""}" onclick="setTab(${i})">${t}</button>`).join("");
}

function renderTopicBar(){
  const tx=TX[lang];
  document.getElementById("topicBar").innerHTML=Object.keys(TOPICS).map(k=>{
    const col=dark?TOPICS[k].darkColor:TOPICS[k].color;
    const bg=dark?TOPICS[k].darkBg:TOPICS[k].bg;
    const isActive=k===topic;
    return `<button class="topic-btn${isActive?" active":""}" onclick="setTopic('${k}')"
      style="${isActive?`border-color:${col};background:${bg};color:${col}`:''}">
      <span class="topic-icon" style="background:${col};color:${dark?"#0a1020":"#fff"}">${TOPICS[k].icon}</span>${k}
    </button>`;
  }).join("")+`<button class="add-btn" onclick="openModal()">${TX[lang].addBtn}</button>`;
}

function renderSections(){
  const tx=TX[lang];
  const t=TOPICS[topic];
  const col=tc();
  const bg=tbg();
  const wrap=document.getElementById("sections");
  wrap.innerHTML="";

  // HOME
  const home=document.createElement("div");
  home.className="section"+(activeTab===0?" active":"");
  home.innerHTML=`<div class="card">
    <div style="font-size:14px;font-weight:500;color:${col};margin-bottom:4px">${t.desc[lang]}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${t.flashcards.length} ${tx.cards} &middot; ${t.quiz.length} ${tx.questions} &middot; ${t.cheatsheet.length} ${tx.refs}</div>
    <div class="home-grid">${TX[lang].tabs.slice(1).map((m,i)=>`<button class="home-btn" onclick="setTab(${i+1})">${m} →</button>`).join("")}</div>
  </div>
  <div class="label-sm">${tx.quickFacts}</div>
  ${t.cheatsheet.slice(0,3).map(item=>`<div class="card"><div style="font-size:13px;font-weight:500;color:${col};margin-bottom:4px">${item.title[lang]}</div><div style="font-size:13px;color:var(--muted);line-height:1.6">${item.content[lang]}</div></div>`).join("")}`;
  wrap.appendChild(home);

  // FLOW
  const flow=document.createElement("div");
  flow.className="section"+(activeTab===1?" active":"");
  flow.innerHTML=`<div style="padding:4px 14px 10px;font-size:11px;color:var(--muted)">${tx.clickNode}</div>
  <div class="flow-wrap"><svg id="flowSvg" style="display:block;min-width:390px;min-height:330px" viewBox="0 0 390 330" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div class="flow-info" id="flowInfo"></div>
  <div class="flow-hint" id="flowHint">${tx.clickNode}</div>`;
  wrap.appendChild(flow);

  // FLASHCARDS
  const fc=document.createElement("div");
  fc.className="section"+(activeTab===2?" active":"");
  const card=t.flashcards[fcIdx];
  fc.innerHTML=`<div style="padding:4px 14px 8px;font-size:12px;color:var(--muted)">${tx.cardOf(fcIdx+1,t.flashcards.length)}</div>
  <div class="fc-card" id="fcCard" onclick="flipCard()" style="border-color:${fcFlipped?col:"var(--border)"}">
    <div class="fc-label">${fcFlipped?tx.answer:tx.question}</div>
    <div class="fc-text">${fcFlipped?card.a[lang]:card.q[lang]}</div>
  </div>
  <div class="fc-nav">
    <button class="btn btn-full" onclick="fcPrev()">${tx.prev}</button>
    <button class="btn btn-accent btn-full" onclick="fcNext()">${tx.next}</button>
  </div>
  <div class="dots">${t.flashcards.map((_,i)=>`<button class="dot-sm${i===fcIdx?" active":""}" onclick="fcGo(${i})"></button>`).join("")}</div>`;
  wrap.appendChild(fc);

  // QUIZ
  const quiz=document.createElement("div");
  quiz.className="section"+(activeTab===3?" active":"");
  if(quizDone){
    quiz.innerHTML=`<div class="card" style="text-align:center">
      <div class="quiz-score">${tx.correct(quizScore,t.quiz.length)}</div>
      <div class="quiz-msg">${quizScore>=t.quiz.length*0.8?tx.great:tx.keep}</div>
      <button class="btn btn-accent" onclick="resetQuiz()">${tx.retry}</button>
    </div>`;
  } else {
    const q=t.quiz[quizIdx];
    quiz.innerHTML=`<div style="padding:4px 14px 8px;font-size:12px;color:var(--muted)">${tx.query(quizIdx+1,t.quiz.length)}</div>
    <div class="card" style="margin-bottom:8px"><div class="quiz-q">${q.q[lang]}</div></div>
    ${q.options[lang].map((opt,i)=>{
      let cls="opt";
      if(quizAns!==null){if(i===q.answer)cls+=" correct";else if(i===quizAns)cls+=" wrong";}
      return `<button class="opt${quizAns!==null?" opt":""}" style="${quizAns!==null&&i===q.answer?`background:${bg};color:${col};border:1.5px solid ${col}`:""}${quizAns!==null&&i===quizAns&&i!==q.answer?";background:"+(dark?"#1a0000":"#fef2f2")+";color:#dc2626;border:1.5px solid #dc2626":""}" onclick="answerQuiz(${i})">${opt}</button>`;
    }).join("")}
    ${quizAns!==null?`<div style="padding:4px 12px"><button class="btn btn-accent btn-full" onclick="nextQuiz()">${quizIdx+1>=t.quiz.length?tx.seeResults:tx.nextQ}</button></div>`:""}`;
  }
  wrap.appendChild(quiz);

  // CHEAT SHEET
  const cs=document.createElement("div");
  cs.className="section"+(activeTab===4?" active":"");
  cs.innerHTML=t.cheatsheet.map(item=>`<div class="card-accent" style="border-left:3px solid ${col}">
    <div style="font-size:13px;font-weight:500;color:${col};margin-bottom:6px">${item.title[lang]}</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.7">${item.content[lang]}</div>
  </div>`).join("");
  wrap.appendChild(cs);

  // VIBE PROMPTS
  const vibe=document.createElement("div");
  vibe.className="section"+(activeTab===5?" active":"");
  const allTags=["All",...new Set(PROMPTS.map(p=>p.tag))];
  const filtered=promptFilter==="All"?PROMPTS:PROMPTS.filter(p=>p.tag===promptFilter);
  vibe.innerHTML=`<div style="padding:8px 14px 10px">
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px">${TX[lang].vibeDesc}</div>
    <div class="prompt-filter">${allTags.map(tag=>`<button class="filter-btn${tag===promptFilter?" active":""}" onclick="setPromptFilter('${tag}')">${tag}</button>`).join("")}</div>
  </div>
  ${filtered.map((p,i)=>{
    const realIdx=PROMPTS.indexOf(p);
    const open=expandedPrompt===realIdx;
    return `<div class="prompt-item">
      <div class="prompt-header" onclick="togglePrompt(${realIdx})">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="prompt-tag">${p.tag}</span>
          <span class="prompt-title">${p.title[lang]}</span>
        </div>
        <span class="prompt-toggle">${open?"−":"+"}</span>
      </div>
      <div class="prompt-body${open?" open":""}">
        <button class="copy-btn" id="copyBtn${realIdx}" onclick="copyPrompt(${realIdx})">${TX[lang].copyBtn}</button>
        <div style="clear:both"></div>
        <pre class="prompt-text">${p.text}</pre>
      </div>
    </div>`;
  }).join("")}`;
  wrap.appendChild(vibe);

  // AI TUTOR
  const ai=document.createElement("div");
  ai.className="section"+(activeTab===6?" active":"");
  ai.innerHTML=`<div class="chat-wrap">
    <div class="chat-label">${TX[lang].askAnything} ${topic}</div>
    <div class="chat-msgs" id="chatMsgs">
      ${chatMessages.length===0?`<div style="text-align:center;padding:32px 0;color:var(--muted)">
        <div style="font-size:12px;margin-bottom:16px">${TX[lang].askAnything} ${topic}</div>
        <button class="chat-suggest" onclick="setSuggest('${TX[lang].s1}')">${TX[lang].s1}</button>
        <button class="chat-suggest" onclick="setSuggest('${TX[lang].s2}')">${TX[lang].s2}</button>
        <button class="chat-suggest" onclick="setSuggest('${TX[lang].s3}')">${TX[lang].s3}</button>
      </div>`:chatMessages.map(m=>`<div class="chat-msg ${m.role==="user"?"user":"ai"}">${m.content}</div>`).join("")}
      ${chatLoading?`<div class="chat-msg ai">${TX[lang].thinking}</div>`:""}
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn btn-accent" onclick="sendChat()">${TX[lang].send}</button>
    </div>
  </div>`;
  wrap.appendChild(ai);

  if(activeTab===1)renderFlow();
  const msgs=document.getElementById("chatMsgs");
  if(msgs)msgs.scrollTop=msgs.scrollHeight;
}

function renderFlow(){
  const svg=document.getElementById("flowSvg");
  if(!svg)return;
  const nodes=FLOW_NODES[topic]||[];
  const edges=FLOW_EDGES[topic]||[];
  const isDark=dark;
  const lineColor=isDark?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.12)";
  const labelColor=isDark?"#444":"#bbb";
  const arrowColor=isDark?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.2)";
  const W=96,H=40;

  const getC=id=>{const n=nodes.find(x=>x.id===id);return n?{x:n.x+W/2,y:n.y+H/2}:{x:0,y:0}};

  let html=`<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="${arrowColor}"/></marker></defs>`;

  edges.forEach(e=>{
    const f=getC(e.from),t=getC(e.to);
    const mx=(f.x+t.x)/2,my=(f.y+t.y)/2;
    html+=`<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" stroke="${lineColor}" stroke-width="1" marker-end="url(#arr)"/>`;
    html+=`<text x="${mx}" y="${my-5}" text-anchor="middle" font-size="9" fill="${labelColor}" font-family="system-ui">${e.label}</text>`;
  });

  nodes.forEach(n=>{
    const col=isDark?n.darkColor:n.color;
    const bg=isDark?n.darkBg:n.bg;
    const isActive=activeNode===n.id;
    const stroke=isActive?col:(isDark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.09)");
    const sw=isActive?1.5:0.5;
    html+=`<g onclick="clickNode('${n.id}')" style="cursor:pointer">
      <rect x="${n.x}" y="${n.y}" width="${W}" height="${H}" rx="8" fill="${bg}" stroke="${stroke}" stroke-width="${sw}"/>
      <text x="${n.x+W/2}" y="${n.y+15}" text-anchor="middle" font-size="11" font-weight="500" fill="${col}" font-family="system-ui">${n.label}</text>
      <text x="${n.x+W/2}" y="${n.y+29}" text-anchor="middle" font-size="9" fill="${col}88" font-family="system-ui">${isActive?"close":"tap for info"}</text>
    </g>`;
  });
  svg.innerHTML=html;

  const info=document.getElementById("flowInfo");
  const hint=document.getElementById("flowHint");
  if(!info||!hint)return;
  if(activeNode){
    const n=nodes.find(x=>x.id===activeNode);
    if(n){
      const col=isDark?n.darkColor:n.color;
      const bg=isDark?n.darkBg:n.bg;
      info.style.display="block";
      info.style.border="1.5px solid "+col;
      info.style.background=bg;
      info.innerHTML=`<div style="font-size:13px;font-weight:500;color:${col};margin-bottom:6px">${n.label}</div><div style="font-size:13px;line-height:1.7;color:var(--text)">${n.desc[lang]}</div>`;
      hint.style.display="none";
    }
  } else {
    info.style.display="none";
    hint.style.display="block";
    hint.textContent=TX[lang].clickNode;
  }
}

function clickNode(id){
  activeNode=activeNode===id?null:id;
  renderFlow();
}

function flipCard(){fcFlipped=!fcFlipped;renderSections();}
function fcPrev(){if(fcIdx>0){fcIdx--;fcFlipped=false;renderSections();}}
function fcNext(){fcIdx=(fcIdx+1)%TOPICS[topic].flashcards.length;fcFlipped=false;renderSections();}
function fcGo(i){fcIdx=i;fcFlipped=false;renderSections();}

function answerQuiz(i){
  if(quizAns!==null)return;
  quizAns=i;
  if(i===TOPICS[topic].quiz[quizIdx].answer)quizScore++;
  renderSections();
}
function nextQuiz(){
  if(quizIdx+1>=TOPICS[topic].quiz.length){quizDone=true;}
  else{quizIdx++;quizAns=null;}
  renderSections();
}
function resetQuiz(){quizIdx=0;quizAns=null;quizScore=0;quizDone=false;renderSections();}

function setPromptFilter(f){promptFilter=f;renderSections();}
function togglePrompt(i){expandedPrompt=expandedPrompt===i?null:i;renderSections();}
function copyPrompt(i){
  navigator.clipboard.writeText(PROMPTS[i].text).then(()=>{
    const btn=document.getElementById("copyBtn"+i);
    if(btn){btn.textContent=TX[lang].copied;setTimeout(()=>{btn.textContent=TX[lang].copyBtn;},1500);}
  });
}

let chatLoading=false;
function setSuggest(t){const inp=document.getElementById("chatInput");if(inp)inp.value=t;}
async function sendChat(){
  const inp=document.getElementById("chatInput");
  if(!inp||!inp.value.trim()||chatLoading)return;
  const msg=inp.value.trim();inp.value="";
  chatMessages.push({role:"user",content:msg});
  chatLoading=true;renderSections();
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"You are a focused IT study tutor for "+topic+". Respond in "+(lang==="nl"?"Dutch":"English")+". Be concise, under 200 words.",messages:chatMessages})});
    const data=await res.json();
    const reply=data.content?data.content.map(b=>b.text||"").join(""):"Geen antwoord.";
    chatMessages.push({role:"assistant",content:reply});
  } catch{chatMessages.push({role:"assistant",content:"Verbindingsfout."});}
  chatLoading=false;renderSections();
}

function openModal(){document.getElementById("addModal").classList.add("open");}
function closeModal(){document.getElementById("addModal").classList.remove("open");}
function confirmAdd(){
  const val=document.getElementById("newTopicInput").value.trim();
  if(val){alert(val+" "+(lang==="nl"?"toegevoegd! Gebruik AI Tutor om het te bestuderen.":"added! Use AI Tutor to study it."));closeModal();document.getElementById("newTopicInput").value="";}
}

document.getElementById("addModal").addEventListener("click",function(e){if(e.target===this)closeModal();});

renderAll();
</script>
</body>
</html>
