<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyHub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── THEMES ── */
:root{
  --bg:#eef0f4;--bg2:#e4e7ed;--surface:#f5f6f8;--surface2:#fff;
  --border:#d1d5db;--text:#111827;--muted:#5a6270;
  --accent:#2563eb;--accent-light:#dbeafe;
  --shadow:rgba(0,0,0,.08);
}
body.fvc-dark{
  --bg:#0f172a;--bg2:#0a1020;--surface:#1e293b;--surface2:#273549;
  --border:#334155;--text:#f1f5f9;--muted:#94a3b8;
  --accent:#38bdf8;--accent-light:rgba(56,189,248,.12);
  --shadow:rgba(0,0,0,.35);
}

/* ── BASE ── */
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;
  transition:background .25s,color .25s;
}
.app-shell{max-width:860px;margin:0 auto;padding-bottom:60px}

/* ── HEADER ── */
.header{
  padding:14px 24px 0;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;top:0;z-index:20;
  transition:background .25s;
}
body.fvc-dark .header{background:rgba(15,23,42,.95);backdrop-filter:blur(12px)}

.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header-left{display:flex;align-items:center;gap:10px}

.back-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit;
  transition:all .15s;
}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

.logo{display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;animation:pulse2 2s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}
.logo-name{font-size:15px;font-weight:700;letter-spacing:.3px;color:var(--text)}
.logo-name span{color:var(--accent)}
.logo-sub{font-size:11px;color:var(--muted);font-weight:400}

.controls{display:flex;gap:6px;align-items:center}
.pill-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px;cursor:pointer}
body.fvc-dark .pill-toggle{background:var(--surface)}
.pill-toggle span{padding:4px 11px;border-radius:14px;font-size:11px;font-weight:400;color:var(--muted);transition:all .15s;white-space:nowrap}
.pill-toggle span.on{background:var(--accent);color:#fff;font-weight:600}
body.fvc-dark .pill-toggle span.on{color:#0a1020}

/* topic tab bar (inside topic view) */
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 18px;font-size:13px;font-weight:400;border:none;background:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-btn:hover:not(.active){color:var(--text)}

/* ── HOME VIEW ── */
.home-view{padding:28px 24px 0}
.section-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}

/* topic grid */
.topic-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:10px;
  margin-bottom:36px;
}
.topic-card{
  display:flex;flex-direction:column;
  padding:16px;border-radius:14px;
  border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;transition:all .2s;text-align:left;
}
body.fvc-dark .topic-card{background:var(--surface)}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px var(--shadow)}
.topic-card-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;margin-bottom:10px;
  flex-shrink:0;
}
.topic-card-body{flex:1}
.topic-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.topic-card-desc{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:6px}
.topic-card-stats{font-size:10px;color:var(--muted)}

/* ── MOBILE: horizontale kaart, groot icoon rechts ── */
@media(max-width:640px){
  .topic-grid{
    grid-template-columns:1fr;
    gap:8px;
  }
  .topic-card{
    flex-direction:row;
    align-items:center;
    gap:14px;
    padding:14px 16px;
  }
  .topic-card-icon{
    order:2;
    width:56px;height:56px;
    border-radius:14px;
    font-size:26px;
    margin-bottom:0;
    flex-shrink:0;
  }
  .topic-card-body{order:1;flex:1;min-width:0}
  .topic-card-name{font-size:14px}
  .topic-card-desc{font-size:11px;margin-bottom:4px}
}

/* ── VIBE PROMPTS (homepage) ── */
.prompt-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600}
body.fvc-dark .filter-btn.active{color:#0a1020;background:rgba(56,189,248,.2)}

.prompt-item{margin-bottom:8px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);overflow:hidden;transition:border-color .15s}
body.fvc-dark .prompt-item{background:var(--surface)}
.prompt-item:hover{border-color:var(--accent)}
.prompt-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:10px}
.prompt-meta{display:flex;align-items:center;gap:8px;min-width:0}
.prompt-tag{font-size:10px;padding:3px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-weight:700;letter-spacing:.5px;flex-shrink:0}
body.fvc-dark .prompt-tag{color:#0a1020}
.prompt-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prompt-toggle{color:var(--accent);font-size:18px;font-weight:300;flex-shrink:0}
.prompt-body{border-top:1px solid var(--border);padding:14px 16px;display:none}
.prompt-body.open{display:block}
.prompt-text{font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-word;font-family:'Inter',sans-serif;color:var(--text);margin-top:8px}
.copy-btn{float:right;background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
body.fvc-dark .copy-btn{color:#0a1020}
.copy-btn:hover{opacity:.85}

/* ── TOPIC VIEW ── */
.topic-view{padding:16px 24px 0}

.card{margin:12px 0;padding:18px;border-radius:14px;border:1px solid var(--border);background:var(--surface2)}
body.fvc-dark .card{background:var(--surface)}
.card-accent{margin:8px 0 8px 2px;padding:16px 18px;border-radius:0 12px 12px 0;border:1px solid var(--border);border-left:3px solid var(--accent);background:var(--surface2)}
body.fvc-dark .card-accent{background:var(--surface)}
.label-sm{font-size:11px;color:var(--accent);padding:14px 0 4px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}

/* flashcards */
.fc-card{padding:28px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);min-height:180px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:border-color .2s;user-select:none;margin:12px 0}
body.fvc-dark .fc-card{background:var(--surface)}
.fc-label{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:14px;text-transform:uppercase;letter-spacing:1.5px}
.fc-text{font-size:16px;line-height:1.75;color:var(--text)}
.fc-nav{display:flex;gap:8px;margin:0 0 8px}
.dots{display:flex;gap:5px;padding:4px 0 12px;flex-wrap:wrap}
.dot-sm{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;border:none;padding:0;transition:background .2s}
.dot-sm.active{background:var(--accent)}

/* buttons */
.btn{padding:10px 20px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.btn-accent:hover{background:var(--accent);color:#fff}
body.fvc-dark .btn-accent:hover{color:#0a1020}
.btn-full{width:100%}

/* quiz */
.quiz-q{font-size:15px;line-height:1.65;font-weight:500}
.opt{margin:0 0 10px;padding:13px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:inherit;text-align:left;width:100%;transition:all .15s}
body.fvc-dark .opt{background:var(--surface2)}
.opt:hover{border-color:var(--accent);background:var(--accent-light)}
.opt.correct{border:1.5px solid var(--accent);background:var(--accent-light);color:var(--accent)}
body.fvc-dark .opt.correct{color:#0a1020;background:rgba(56,189,248,.2)}
.opt.wrong{border:1.5px solid #ef4444;background:rgba(239,68,68,.08);color:#ef4444}
.quiz-score{font-size:28px;font-weight:700;color:var(--accent);text-align:center;margin-bottom:6px}
.quiz-msg{font-size:14px;color:var(--muted);text-align:center;margin-bottom:20px}

/* flow */
.flow-wrap{border-radius:14px;border:1px solid var(--border);background:var(--surface2);overflow:auto;margin:12px 0}
body.fvc-dark .flow-wrap{background:var(--surface)}
.flow-info{margin:12px 0 0;padding:16px 18px;border-radius:14px;font-size:13px;line-height:1.75;display:none}
.flow-hint{margin:12px 0 0;padding:14px 18px;border-radius:14px;border:1px dashed var(--border);text-align:center;font-size:13px;color:var(--muted)}

/* notes */
.notes-view{padding-top:8px}
.note-add-btn{display:flex;align-items:center;gap:8px;padding:11px 16px;border-radius:10px;border:1px dashed var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit;width:100%;margin-bottom:14px;transition:all .15s}
.note-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.note-item{margin-bottom:8px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);overflow:hidden;transition:border-color .15s}
body.fvc-dark .note-item{background:var(--surface)}
.note-item:hover{border-color:var(--accent)}
.note-header{padding:12px 16px;display:flex;align-items:center;gap:8px;cursor:pointer}
.note-title-input{border:none;background:transparent;font-size:14px;font-weight:500;color:var(--text);font-family:inherit;flex:1;outline:none;cursor:pointer}
.note-title-input:focus{cursor:text}
.note-meta{font-size:10px;color:var(--muted);flex-shrink:0;white-space:nowrap}
.note-delete{color:var(--muted);background:transparent;border:none;cursor:pointer;font-size:15px;padding:2px 6px;border-radius:6px;transition:color .15s;flex-shrink:0}
.note-delete:hover{color:#ef4444}
.note-body{border-top:1px solid var(--border);padding:14px 16px;display:none}
.note-body.open{display:block}
.note-textarea{width:100%;min-height:140px;border:none;background:transparent;font-size:13px;line-height:1.8;color:var(--text);font-family:inherit;resize:vertical;outline:none}
.note-empty{text-align:center;padding:40px 0;color:var(--muted);font-size:13px}

svg text{user-select:none}
</style>
</head>

          <div class="logo-dot" style="background:var(--accent)"></div>
          <div>
            <div class="logo-name">IT_Dev<span>.</span>Hub</div>

  </div>

  <!-- TOPIC VIEW -->
  <div id="topicView" class="topic-view" style="display:none">
    <div id="topicContent"></div>
  </div>

</div>

{tag:"IT-Werk",title:{en:"Project plan & breakdown",nl:"Projectplan"},text:"Je bent projectmanager en technisch architect.\n\nMaak een plan voor:\nProject: [BESCHRIJF PROJECT]\nTech stack: [STACK]\nbijv. React, Python, Azure\n\nGeef: projectfases + deliverables, taakverdeling, risico's, tijdsinschatting, MVP-definitie."},
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let dark = true, topic = "MD-102", view = "home", activeTab = 0;
const lang = "nl"; // taal vast ingesteld op Nederlands
let fcIdx = 0, fcFlipped = false;
let quizIdx = 0, quizAns = null, quizScore = 0, quizDone = false;
let activeNode = null, promptFilter = "All", expandedPrompt = null;
let expandedNote = null;

const TX = {
  en:{
    topicsLabel:"Topics", vibeLabel:"Vibe Prompts",
    tabs:["Flow","Flashcards","Quiz","Cheat Sheet"],
    notesTitle:"Notes", notesAdd:"+ New note", notesEmpty:"No notes yet. Add one above.",
    cardOf:(a,b)=>`Card ${a} of ${b} — click to flip`,
    question:"Question", answer:"Answer", prev:"Prev", next:"Next",
    correct:(a,b)=>`${a}/${b} correct`,
    great:"Great work!", keep:"Keep studying!", retry:"Try again",
    query:(a,b)=>`Question ${a} of ${b}`,
    seeResults:"See results", nextQ:"Next",
    vibeDesc:"Ready-to-use prompt templates — copy and paste into any AI.",
    copyBtn:"Copy", copied:"Copied!",
    clickNode:"Click a node to see details",
    statsCards:"cards", statsQ:"questions", statsRefs:"refs",
  },
  nl:{
    topicsLabel:"Onderwerpen", vibeLabel:"Vibe Prompts",
    tabs:["Flow","Flashcards","Quiz","Spiekbrief"],
    notesTitle:"Notities", notesAdd:"+ Nieuwe notitie", notesEmpty:"Nog geen notities. Voeg er een toe.",
    cardOf:(a,b)=>`Kaart ${a} van ${b} — klik om te draaien`,
    question:"Vraag", answer:"Antwoord", prev:"Vorige", next:"Volgende",
    correct:(a,b)=>`${a}/${b} correct`,
    great:"Goed gedaan!", keep:"Blijf studeren!", retry:"Opnieuw",
    query:(a,b)=>`Vraag ${a} van ${b}`,
    seeResults:"Resultaten", nextQ:"Volgende",
    vibeDesc:"Kant-en-klare prompt templates — kopieer en plak in elke AI.",
    copyBtn:"Kopieer", copied:"Gekopieerd!",
    clickNode:"Klik op een knoop voor details",
    statsCards:"kaarten", statsQ:"vragen", statsRefs:"refs",
  }
};

/* ═══════════════════════════════════════════
   THEME / LANG
═══════════════════════════════════════════ */
function applyTheme(){
  document.body.classList.toggle("fvc-dark", dark);
  document.getElementById("tDark").classList.toggle("on", dark);
  document.getElementById("tLight").classList.toggle("on", !dark);
  if(view==="topic" && activeTab===0) renderFlow();
}
function toggleTheme(){ dark=!dark; applyTheme(); }

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function goHome(){
  view="home";
  document.getElementById("backBtn").style.display="none";
  document.getElementById("appSub").textContent="StudyHub";
  document.getElementById("tabBar").style.display="none";
  document.getElementById("homeView").style.display="";
  document.getElementById("topicView").style.display="none";
  renderHome();
}

function openTopic(key){
  topic=key; view="topic";
  fcIdx=0; fcFlipped=false;
  quizIdx=0; quizAns=null; quizScore=0; quizDone=false;
  activeNode=null; activeTab=0;

  document.getElementById("backBtn").style.display="";
  document.getElementById("appSub").textContent=key;
  document.getElementById("homeView").style.display="none";
  document.getElementById("topicView").style.display="";

  const isNotes = TOPICS[key].type === "notes";
  document.getElementById("tabBar").style.display = isNotes ? "none" : "";

  if(!isNotes) renderTabBar();
  renderTopic();
}

function setTab(i){
  activeTab=i;
  document.querySelectorAll(".tab-btn").forEach((b,j)=>b.classList.toggle("active",j===i));
  renderTopic();
}

function renderAll(){
  const tx=TX[lang];
  document.getElementById("topicsLabel").textContent=tx.topicsLabel;
  document.getElementById("vibeLabel").textContent=tx.vibeLabel;
  if(view==="home") renderHome();
  else {
    document.getElementById("appSub").textContent=topic;
    if(TOPICS[topic].type!=="notes") renderTabBar();
    renderTopic();
  }
}

/* ═══════════════════════════════════════════
   HOME
═══════════════════════════════════════════ */
function renderHome(){
  renderTopicGrid();
  renderVibePrompts();
}

function renderTopicGrid(){
  const grid = document.getElementById("topicGrid");
  const tx = TX[lang];
  grid.innerHTML = Object.entries(TOPICS).map(([key, t]) => {
    const col  = dark ? t.darkColor : t.color;
    const bg   = dark ? t.darkBg   : t.bg;
    const isNotes = t.type === "notes";
    const stats = isNotes
      ? `<span style="color:var(--accent)">${tx.notesTitle}</span>`
      : `${t.flashcards.length} ${tx.statsCards} · ${t.quiz.length} ${tx.statsQ} · ${t.cheatsheet.length} ${tx.statsRefs}`;
    return `<button class="topic-card" onclick="openTopic('${key}')">
      <div class="topic-card-icon" style="background:${bg};color:${col}">${t.icon}</div>
      <div class="topic-card-body">
        <div class="topic-card-name">${key}</div>
        <div class="topic-card-desc">${t.desc[lang]}</div>
        <div class="topic-card-stats">${stats}</div>
      </div>
    </button>`;
  }).join("");
}

function renderVibePrompts(){
  const tx = TX[lang];
  const allTags = ["All", ...new Set(PROMPTS.map(p=>p.tag))];
  const filtered = promptFilter==="All" ? PROMPTS : PROMPTS.filter(p=>p.tag===promptFilter);
  const sec = document.getElementById("vibeSection");
  sec.innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${tx.vibeDesc}</div>
    <div class="prompt-filter">
      ${allTags.map(tag=>`<button class="filter-btn${tag===promptFilter?" active":""}" onclick="setPromptFilter('${tag}')">${tag}</button>`).join("")}
    </div>
    ${filtered.map(p=>{
      const realIdx = PROMPTS.indexOf(p);
      const open = expandedPrompt === realIdx;
      return `<div class="prompt-item">
        <div class="prompt-header" onclick="togglePrompt(${realIdx})">
          <div class="prompt-meta">
            <span class="prompt-tag">${p.tag}</span>
            <span class="prompt-title">${p.title[lang]}</span>
          </div>
          <span class="prompt-toggle">${open?"−":"+"}</span>
        </div>
        <div class="prompt-body${open?" open":""}">
          <button class="copy-btn" id="cpBtn${realIdx}" onclick="copyPrompt(${realIdx})">${tx.copyBtn}</button>
          <div style="clear:both"></div>
          <pre class="prompt-text">${escHtml(p.text)}</pre>
        </div>
      </div>`;
    }).join("")}`;
}

function setPromptFilter(f){ promptFilter=f; renderVibePrompts(); }
function togglePrompt(i){ expandedPrompt=expandedPrompt===i?null:i; renderVibePrompts(); }
function copyPrompt(i){
  navigator.clipboard.writeText(PROMPTS[i].text).then(()=>{
    const btn=document.getElementById("cpBtn"+i);
    if(btn){
      const tx=TX[lang];
      btn.textContent=tx.copied;
      setTimeout(()=>{ btn.textContent=tx.copyBtn; },1500);
    }
  });
}

/* ═══════════════════════════════════════════
   TOPIC VIEW
═══════════════════════════════════════════ */
function renderTabBar(){
  const tx=TX[lang];
  document.getElementById("tabBar").innerHTML=tx.tabs.map((t,i)=>
    `<button class="tab-btn${i===activeTab?" active":""}" onclick="setTab(${i})">${t}</button>`
  ).join("");
}

function renderTopic(){
  const t=TOPICS[topic];
  if(t.type==="notes"){ renderNotes(); return; }
  const content=document.getElementById("topicContent");
  content.innerHTML="";
  const col=dark?t.darkColor:t.color;
  const bg=dark?t.darkBg:t.bg;
  const tx=TX[lang];

  if(activeTab===0){
    // FLOW
    content.innerHTML=`
      <div style="padding:10px 0 8px;font-size:11px;color:var(--muted)">${tx.clickNode}</div>
      <div class="flow-wrap">
        <svg id="flowSvg" style="display:block;width:100%;min-height:330px" viewBox="0 0 390 330" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="flow-info" id="flowInfo"></div>
      <div class="flow-hint" id="flowHint">${tx.clickNode}</div>`;
    renderFlow();

  } else if(activeTab===1){
    // FLASHCARDS
    const card=t.flashcards[fcIdx];
    content.innerHTML=`
      <div style="padding:10px 0 4px;font-size:12px;color:var(--muted)">${tx.cardOf(fcIdx+1,t.flashcards.length)}</div>
      <div class="fc-card" onclick="flipCard()" style="border-color:${fcFlipped?col:"var(--border)"}">
        <div class="fc-label">${fcFlipped?tx.answer:tx.question}</div>
        <div class="fc-text">${fcFlipped?card.a[lang]:card.q[lang]}</div>
      </div>
      <div class="fc-nav">
        <button class="btn btn-full" onclick="fcPrev()">${tx.prev}</button>
        <button class="btn btn-accent btn-full" onclick="fcNext()">${tx.next}</button>
      </div>
      <div class="dots">${t.flashcards.map((_,i)=>`<button class="dot-sm${i===fcIdx?" active":""}" onclick="fcGo(${i})"></button>`).join("")}</div>`;

  } else if(activeTab===2){
    // QUIZ
    if(quizDone){
      content.innerHTML=`<div class="card" style="text-align:center;margin-top:12px">
        <div class="quiz-score">${tx.correct(quizScore,t.quiz.length)}</div>
        <div class="quiz-msg">${quizScore>=t.quiz.length*0.8?tx.great:tx.keep}</div>
        <button class="btn btn-accent" onclick="resetQuiz()">${tx.retry}</button>
      </div>`;
    } else {
      const q=t.quiz[quizIdx];
      content.innerHTML=`
        <div style="padding:10px 0 4px;font-size:12px;color:var(--muted)">${tx.query(quizIdx+1,t.quiz.length)}</div>
        <div class="card" style="margin-bottom:8px"><div class="quiz-q">${q.q[lang]}</div></div>
        ${q.options[lang].map((opt,i)=>{
          let style="";
          if(quizAns!==null){
            if(i===q.answer) style=`background:${bg};color:${col};border:1.5px solid ${col}`;
            else if(i===quizAns) style=`background:${dark?"#1a0000":"#fef2f2"};color:#dc2626;border:1.5px solid #dc2626`;
          }
          return `<button class="opt" style="${style}" onclick="answerQuiz(${i})">${opt}</button>`;
        }).join("")}
        ${quizAns!==null?`<button class="btn btn-accent btn-full" style="margin-top:4px" onclick="nextQuiz()">${quizIdx+1>=t.quiz.length?tx.seeResults:tx.nextQ}</button>`:""}`;
    }

  } else if(activeTab===3){
    // CHEAT SHEET
    content.innerHTML=t.cheatsheet.map(item=>`
      <div class="card-accent" style="border-left-color:${col}">
        <div style="font-size:13px;font-weight:500;color:${col};margin-bottom:6px">${item.title[lang]}</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.7">${item.content[lang]}</div>
      </div>`).join("");
  }
}

/* ── Flow ── */
function renderFlow(){
  const svg=document.getElementById("flowSvg");
  if(!svg)return;
  const nodes=FLOW_NODES[topic]||[];
  const edges=FLOW_EDGES[topic]||[];
  const lineColor=dark?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.12)";
  const labelColor=dark?"#555":"#aaa";
  const arrowColor=dark?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.2)";
  const W=96,H=40;
  const getC=id=>{const n=nodes.find(x=>x.id===id);return n?{x:n.x+W/2,y:n.y+H/2}:{x:0,y:0}};

  let html=`<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="${arrowColor}"/></marker></defs>`;

  edges.forEach(e=>{
    const f=getC(e.from),t=getC(e.to);
    const mx=(f.x+t.x)/2,my=(f.y+t.y)/2;
    html+=`<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" stroke="${lineColor}" stroke-width="1" marker-end="url(#arr)"/>`;
    html+=`<text x="${mx}" y="${my-5}" text-anchor="middle" font-size="9" fill="${labelColor}" font-family="system-ui">${e.label}</text>`;
  });

  nodes.forEach(n=>{
    const col=dark?n.darkColor:n.color;
    const bg=dark?n.darkBg:n.bg;
    const isActive=activeNode===n.id;
    const stroke=isActive?col:(dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.09)");
    html+=`<g onclick="clickNode('${n.id}')" style="cursor:pointer">
      <rect x="${n.x}" y="${n.y}" width="${W}" height="${H}" rx="8" fill="${bg}" stroke="${stroke}" stroke-width="${isActive?1.5:.5}"/>
      <text x="${n.x+W/2}" y="${n.y+15}" text-anchor="middle" font-size="11" font-weight="500" fill="${col}" font-family="system-ui">${n.label}</text>
      <text x="${n.x+W/2}" y="${n.y+29}" text-anchor="middle" font-size="9" fill="${col}88" font-family="system-ui">${isActive?"close":"tap"}</text>
    </g>`;
  });
  svg.innerHTML=html;

  const info=document.getElementById("flowInfo");
  const hint=document.getElementById("flowHint");
  if(!info||!hint)return;
  if(activeNode){
    const n=nodes.find(x=>x.id===activeNode);
    if(n){
      const col=dark?n.darkColor:n.color;
      const bg=dark?n.darkBg:n.bg;
      info.style.cssText=`display:block;border:1.5px solid ${col};background:${bg}`;
      info.innerHTML=`<div style="font-size:13px;font-weight:500;color:${col};margin-bottom:6px">${n.label}</div>
        <div style="font-size:13px;line-height:1.7;color:var(--text)">${n.desc[lang]}</div>`;
      hint.style.display="none";
    }
  } else {
    info.style.display="none";
    hint.style.display="";
    hint.textContent=TX[lang].clickNode;
  }
}

function clickNode(id){ activeNode=activeNode===id?null:id; renderFlow(); }

/* ── Flashcards ── */
function flipCard(){ fcFlipped=!fcFlipped; renderTopic(); }
function fcPrev(){ if(fcIdx>0){fcIdx--;fcFlipped=false;renderTopic();} }
function fcNext(){ fcIdx=(fcIdx+1)%TOPICS[topic].flashcards.length;fcFlipped=false;renderTopic(); }
function fcGo(i){ fcIdx=i;fcFlipped=false;renderTopic(); }

/* ── Quiz ── */
function answerQuiz(i){
  if(quizAns!==null)return;
  quizAns=i;
  if(i===TOPICS[topic].quiz[quizIdx].answer)quizScore++;
  renderTopic();
}
function nextQuiz(){
  if(quizIdx+1>=TOPICS[topic].quiz.length){ quizDone=true; }
  else{ quizIdx++; quizAns=null; }
  renderTopic();
}
function resetQuiz(){ quizIdx=0;quizAns=null;quizScore=0;quizDone=false;renderTopic(); }

/* ═══════════════════════════════════════════
   NOTES (localStorage)
═══════════════════════════════════════════ */
function getNotes(){ return JSON.parse(localStorage.getItem("studyhub_notes")||"[]"); }
function saveNotes(n){ localStorage.setItem("studyhub_notes",JSON.stringify(n)); }

function renderNotes(){
  const tx=TX[lang];
  const notes=getNotes();
  const content=document.getElementById("topicContent");
  content.innerHTML=`<div class="notes-view">
    <button class="note-add-btn" onclick="addNote()">+ ${lang==="nl"?"Nieuwe notitie":"New note"}</button>
    ${notes.length===0
      ? `<div class="note-empty">${lang==="nl"?"Nog geen notities. Voeg er een toe hierboven.":"No notes yet. Add one above."}</div>`
      : notes.map(note=>{
          const open = expandedNote===note.id;
          const d = new Date(note.created);
          const dateStr = d.toLocaleDateString(lang==="nl"?"nl-NL":"en-GB",{day:"numeric",month:"short"});
          return `<div class="note-item">
            <div class="note-header" onclick="toggleNote(${note.id})">
              <input class="note-title-input" value="${escAttr(note.title)}"
                onclick="event.stopPropagation()"
                onblur="updateNoteTitle(${note.id},this.value)"
                placeholder="${lang==="nl"?"Titel...":"Title..."}">
              <span class="note-meta">${dateStr}</span>
              <button class="note-delete" onclick="event.stopPropagation();deleteNote(${note.id})" title="Verwijderen">×</button>
            </div>
            <div class="note-body${open?" open":""}">
              <textarea class="note-textarea"
                onblur="updateNoteContent(${note.id},this.value)"
                placeholder="${lang==="nl"?"Schrijf hier je notitie...":"Write your note here..."}">${escHtml(note.content)}</textarea>
            </div>
          </div>`;
        }).join("")
    }
  </div>`;
}

function addNote(){
  const notes=getNotes();
  const id=Date.now();
  notes.unshift({id,title:lang==="nl"?"Nieuwe notitie":"New note",content:"",created:new Date().toISOString()});
  saveNotes(notes);
  expandedNote=id;
  renderNotes();
}

function toggleNote(id){ expandedNote=expandedNote===id?null:id; renderNotes(); }

function updateNoteTitle(id,val){
  const notes=getNotes().map(n=>n.id===id?{...n,title:val||""}:n);
  saveNotes(notes);
}

function updateNoteContent(id,val){
  const notes=getNotes().map(n=>n.id===id?{...n,content:val}:n);
  saveNotes(notes);
}

function deleteNote(id){
  if(!confirm(lang==="nl"?"Notitie verwijderen?":"Delete note?"))return;
  saveNotes(getNotes().filter(n=>n.id!==id));
  if(expandedNote===id)expandedNote=null;
  renderNotes();
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function escHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s){ return s.replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderHome();
</script>
</body>
</html>
