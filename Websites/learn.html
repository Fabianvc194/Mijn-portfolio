<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyHub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
:root{--bg:#f4f6f9;--bg2:#fff;--bg3:#eef1f6;--text:#1a1d23;--muted:#6b7280;--border:rgba(0,0,0,0.09);--borderm:rgba(0,0,0,0.15);--navbg:#fff;--togglebg:#e8ecf2;--inputbg:#fff}
body.dark{--bg:#000;--bg2:#0a0a0a;--bg3:#111;--text:#f0f0f0;--muted:#777;--border:rgba(255,255,255,0.08);--borderm:rgba(255,255,255,0.14);--navbg:#000;--togglebg:#111;--inputbg:#0a0a0a}
.header{padding:12px 14px 0;border-bottom:.5px solid var(--border);background:var(--navbg);position:sticky;top:0;z-index:20}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--tc)}
.logo-text{font-size:15px;font-weight:500}
.logo-sub{font-size:11px;color:var(--muted)}
.toggles{display:flex;gap:6px}
.toggle{display:flex;align-items:center;background:var(--togglebg);border:.5px solid var(--border);border-radius:20px;padding:3px;cursor:pointer;gap:2px}
.toggle span{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:400;color:var(--muted);transition:all .15s}
.toggle span.on{background:var(--bg2);color:var(--text);font-weight:500}
.tabs{display:flex;overflow-x:auto;gap:0}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 11px;font-size:12px;font-weight:400;border:none;background:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.tab-btn.active{color:var(--tc);border-bottom-color:var(--tc);font-weight:500}
.topicbar{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-bottom:.5px solid var(--border);background:var(--navbg)}
.topicbar::-webkit-scrollbar{display:none}
.topic-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:.5px solid var(--border);background:var(--bg2);cursor:pointer;font-size:12px;font-weight:400;color:var(--muted);font-family:inherit;white-space:nowrap;transition:all .15s}
.topic-btn.active{font-weight:500}
.topic-icon{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.add-btn{padding:5px 12px;border-radius:20px;border:.5px dashed var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--muted);font-family:inherit;white-space:nowrap}
.section{display:none;padding:4px 0}
.section.active{display:block}
.card{margin:8px 12px;padding:16px;border-radius:12px;border:.5px solid var(--border);background:var(--bg2)}
.card-accent{border-left:3px solid var(--tc);border-radius:0 12px 12px 0;margin:8px 12px 8px 14px;padding:14px 16px;background:var(--bg2);border-top:.5px solid var(--border);border-right:.5px solid var(--border);border-bottom:.5px solid var(--border)}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.home-btn{padding:8px 12px;border-radius:8px;border:.5px solid var(--border);background:transparent;color:var(--tc);cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;text-align:left}
.label-sm{font-size:11px;color:var(--muted);padding:8px 14px 4px}
.fc-card{margin:0 12px;padding:20px;border-radius:12px;border:.5px solid var(--border);background:var(--bg2);min-height:190px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:border-color .2s}
.fc-label{font-size:10px;font-weight:500;color:var(--tc);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px}
.fc-text{font-size:15px;line-height:1.7}
.fc-nav{display:flex;gap:8px;padding:10px 12px}
.dots{display:flex;gap:4px;padding:0 14px;flex-wrap:wrap}
.dot-sm{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .2s;border:none}
.dot-sm.active{background:var(--tc)}
.btn{padding:10px 18px;border-radius:8px;border:.5px solid var(--borderm);background:transparent;color:var(--text);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}
.btn-accent{border-color:var(--tc);color:var(--tc)}
.btn-full{width:100%}
.quiz-q{font-size:14px;line-height:1.6;font-weight:500}
.opt{margin:0 12px 8px;padding:12px 16px;border-radius:8px;border:.5px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s;font-family:inherit;text-align:left;width:calc(100% - 24px)}
.opt.correct{border:1.5px solid var(--tc);color:var(--tc)}
.opt.wrong{border:1.5px solid #dc2626;color:#dc2626;background:#fef2f2}
body.dark .opt.wrong{background:#1a0000}
.quiz-score{font-size:22px;font-weight:500;color:var(--tc);text-align:center;margin-bottom:4px}
.quiz-msg{font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px}
.prompt-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{padding:4px 12px;border-radius:20px;border:.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}
.filter-btn.active{border-color:var(--purple);background:var(--purplebg);color:var(--purpletext);font-weight:500}
.prompt-item{margin:0 12px 8px;border-radius:12px;border:.5px solid var(--promptborder);background:var(--promptbg);overflow:hidden}
.prompt-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:8px}
.prompt-tag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--purplebg);color:var(--purpletext);font-weight:500}
.prompt-title{font-size:13px;font-weight:500}
.prompt-toggle{color:var(--purple);font-size:16px}
.prompt-body{border-top:.5px solid var(--promptborder);padding:12px 16px;background:var(--promptbodybg);display:none}
.prompt-body.open{display:block}
.prompt-text{font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;font-family:system-ui;background:transparent;color:var(--text)}
.copy-btn{background:var(--purple);color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:10px;float:right}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 200px);min-height:380px}
.chat-label{padding:8px 14px;font-size:12px;color:var(--muted);border-bottom:.5px solid var(--border)}
.chat-msgs{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:82%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.7;border:.5px solid var(--border)}
.chat-msg.user{align-self:flex-end;background:var(--tcbg);border-color:var(--tc);color:var(--tc)}
.chat-msg.ai{align-self:flex-start;background:var(--bg2);color:var(--text)}
.chat-input-row{padding:8px 12px;display:flex;gap:8px;border-top:.5px solid var(--border);background:var(--navbg)}
.chat-input{flex:1;padding:10px 14px;border-radius:8px;border:.5px solid var(--borderm);font-size:13px;background:var(--inputbg);color:var(--text);font-family:inherit;outline:none}
.flow-wrap{margin:0 12px;border-radius:12px;border:.5px solid var(--border);background:var(--bg2);overflow:auto;-webkit-overflow-scrolling:touch;max-height:340px}
.flow-info{margin:10px 12px 0;padding:14px 16px;border-radius:12px;font-size:13px;line-height:1.7;display:none}
.flow-info.open{display:block}
.flow-hint{margin:10px 12px 0;padding:12px 16px;border-radius:12px;border:.5px dashed var(--border);text-align:center;font-size:12px;color:var(--muted)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);align-items:flex-end;z-index:100}
.modal-overlay.open{display:flex}
.modal{width:100%;background:var(--bg2);border-radius:16px 16px 0 0;padding:24px;border:.5px solid var(--border);max-width:480px;margin:0 auto}
.modal-title{font-size:15px;font-weight:500;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:14px}
.modal-input{width:100%;padding:10px 14px;border-radius:8px;border:.5px solid var(--borderm);font-size:13px;margin-bottom:12px;background:var(--inputbg);color:var(--text);font-family:inherit;outline:none}
.modal-btns{display:flex;gap:8px}
:root{--tc:#185FA5;--tcbg:#E6F1FB;--purple:#533AB7;--purplebg:#EEEDFE;--purpletext:#3C3489;--promptborder:rgba(83,58,183,0.18);--promptbg:rgba(83,58,183,0.03);--promptbodybg:rgba(255,255,255,0.6)}
body.dark{--purplebg:rgba(83,58,183,0.2);--purpletext:#AFA9EC;--promptborder:rgba(175,169,236,0.2);--promptbg:rgba(83,58,183,0.06);--promptbodybg:rgba(0,0,0,0.3)}
svg text{user-select:none}
.chat-suggest{display:block;width:100%;margin-bottom:8px;padding:10px 14px;border-radius:8px;border:.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;text-align:left}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="logo">
      <div class="dot" id="logoDot"></div>
      <div>
        <div class="logo-text">StudyHub</div>
        <div class="logo-sub" id="appSub">IT Examenvoorbereiding</div>
      </div>
    </div>
    <div class="toggles">
      <button class="toggle" id="themeToggle" onclick="toggleTheme()">
        <span id="tLight" class="on">Light</span>
        <span id="tDark">Dark</span>
      </button>
      <button class="toggle" id="langToggle" onclick="toggleLang()">
        <span id="tNL" class="on">NL</span>
        <span id="tEN">EN</span>
      </button>
    </div>
  </div>
  <div class="tabs" id="tabBar"></div>
</div>

<div class="topicbar" id="topicBar"></div>
<div id="sections"></div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title" id="mTitle">Onderwerp toevoegen</div>
    <div class="modal-sub" id="mSub">Typ een onderwerp en bestudeer het via AI Tutor.</div>
    <input class="modal-input" id="newTopicInput" placeholder="bijv. AZ-900, Docker, Security+">
    <div class="modal-btns">
      <button class="btn btn-full" onclick="closeModal()" id="mCancel">Annuleren</button>
      <button class="btn btn-accent btn-full" onclick="confirmAdd()" id="mConfirm">Toevoegen</button>
    </div>
  </div>
</div>

<script>
const TOPICS = {
  "MD-102": {
    icon:"M", color:"#185FA5", bg:"#E6F1FB", darkColor:"#60b4f0", darkBg:"#0c1e30",
    desc:{en:"Microsoft Endpoint Administrator",nl:"Microsoft Endpoint Beheerder"},
    cheatsheet:[
      {title:{en:"Intune Enrollment",nl:"Intune Inschrijving"},content:{en:"MDM enrollment via Azure AD join, Autopilot, or Company Portal. Supports Windows, iOS, Android, macOS.",nl:"MDM-inschrijving via Azure AD-koppeling, Autopilot of Bedrijfsportal. Ondersteunt Windows, iOS, Android, macOS."}},
      {title:{en:"Compliance Policies",nl:"Nalevingsbeleid"},content:{en:"Define rules devices must meet. Non-compliant = blocked access via Conditional Access.",nl:"Regels waaraan apparaten moeten voldoen. Niet-conform = geblokkeerde toegang via Voorwaardelijke Toegang."}},
      {title:{en:"Configuration Profiles",nl:"Configuratieprofielen"},content:{en:"Push settings (Wi-Fi, VPN, email, restrictions) to devices via Intune profiles.",nl:"Instellingen (Wi-Fi, VPN, e-mail) pushen naar apparaten via Intune-profielen."}},
      {title:{en:"Windows Autopilot",nl:"Windows Autopilot"},content:{en:"Zero-touch deployment. Device ships directly to user, auto-configures via Azure AD + Intune.",nl:"Implementatie zonder aanraking. Apparaat gaat direct naar gebruiker, configureert automatisch via Azure AD + Intune."}},
      {title:{en:"Conditional Access",nl:"Voorwaardelijke Toegang"},content:{en:"Azure AD policy: grant/block access based on user, device compliance, location, MFA.",nl:"Azure AD-beleid: toegang verlenen/blokkeren op basis van gebruiker, apparaatnaleving, locatie, MFA."}},
      {title:{en:"App Deployment",nl:"App-implementatie"},content:{en:"Deploy via Intune: required, available, or uninstall. Supports Win32, MSI, MSIX, web apps.",nl:"Implementeren via Intune: verplicht, beschikbaar of verwijderen. Ondersteunt Win32, MSI, MSIX, webapps."}},
    ],
    flashcards:[
      {q:{en:"What is Microsoft Intune?",nl:"Wat is Microsoft Intune?"},a:{en:"A cloud-based MDM/MAM solution to manage devices and apps across platforms.",nl:"Een cloudgebaseerde MDM/MAM-oplossing voor het beheren van apparaten en apps op verschillende platforms."}},
      {q:{en:"What does MDM stand for?",nl:"Waar staat MDM voor?"},a:{en:"Mobile Device Management – manages the entire device.",nl:"Mobile Device Management – beheert het gehele apparaat."}},
      {q:{en:"What does MAM stand for?",nl:"Waar staat MAM voor?"},a:{en:"Mobile Application Management – manages apps without enrolling the device.",nl:"Mobile Application Management – beheert apps zonder het apparaat in te schrijven."}},
      {q:{en:"What is Windows Autopilot?",nl:"Wat is Windows Autopilot?"},a:{en:"A zero-touch deployment tool that auto-configures devices using Azure AD and Intune.",nl:"Een implementatietool zonder aanraking die apparaten automatisch configureert via Azure AD en Intune."}},
      {q:{en:"What is a Compliance Policy?",nl:"Wat is een Nalevingsbeleid?"},a:{en:"A set of rules a device must meet to gain access to resources.",nl:"Een reeks regels waaraan een apparaat moet voldoen om toegang te krijgen tot bronnen."}},
      {q:{en:"What is Conditional Access?",nl:"Wat is Voorwaardelijke Toegang?"},a:{en:"Azure AD feature that grants or blocks access based on conditions like device compliance.",nl:"Azure AD-functie die toegang verleent of blokkeert op basis van voorwaarden zoals apparaatnaleving."}},
      {q:{en:"What is Azure AD Join?",nl:"Wat is Azure AD-koppeling?"},a:{en:"Connects a device directly to Azure AD (cloud-only). Replaces traditional domain join.",nl:"Verbindt een apparaat direct met Azure AD (alleen cloud). Vervangt traditionele domeinverbinding."}},
      {q:{en:"What is a Configuration Profile?",nl:"Wat is een Configuratieprofiel?"},a:{en:"Used in Intune to push device settings like Wi-Fi, VPN, and email.",nl:"Wordt gebruikt in Intune om apparaatinstellingen zoals Wi-Fi, VPN en e-mail te pushen."}},
    ],
    quiz:[
      {q:{en:"Which feature allows zero-touch Windows device setup?",nl:"Welke functie maakt zero-touch Windows-instelling mogelijk?"},options:{en:["Autopilot","SCCM","WDS","Sysprep"],nl:["Autopilot","SCCM","WDS","Sysprep"]},answer:0},
      {q:{en:"What does Conditional Access use to grant or deny access?",nl:"Wat gebruikt Voorwaardelijke Toegang om toegang te verlenen of weigeren?"},options:{en:["Device name","Signals like compliance, location, MFA","Job title","IP only"],nl:["Apparaatnaam","Signalen zoals naleving, locatie, MFA","Functietitel","Alleen IP"]},answer:1},
      {q:{en:"Which Intune policy enforces device health rules?",nl:"Welk Intune-beleid handhaaft gezondheidsregels?"},options:{en:["Config Profile","App Protection","Compliance Policy","Update Ring"],nl:["Configuratieprofiel","App-beveiliging","Nalevingsbeleid","Updatering"]},answer:2},
      {q:{en:"Primary role of MAM?",nl:"Primaire rol van MAM?"},options:{en:["Manage whole device","Manage apps without enrollment","Deploy updates","Monitor network"],nl:["Volledig apparaat","Apps zonder inschrijving","Updates","Netwerk"]},answer:1},
      {q:{en:"Which enrollment method ships directly to end user?",nl:"Welke methode gaat direct naar eindgebruiker?"},options:{en:["Company Portal","Autopilot","Manual MDM","SCCM"],nl:["Bedrijfsportal","Autopilot","Handmatige MDM","SCCM"]},answer:1},
    ]
  },
  "CCNA": {
    icon:"C", color:"#0F6E56", bg:"#E1F5EE", darkColor:"#4ade80", darkBg:"#0a1f18",
    desc:{en:"Cisco Certified Network Associate",nl:"Cisco Gecertificeerd Netwerkmedewerker"},
    cheatsheet:[
      {title:{en:"OSI Model",nl:"OSI-model"},content:{en:"7 layers: Physical, Data Link, Network, Transport, Session, Presentation, Application.",nl:"7 lagen: Fysiek, Datalink, Netwerk, Transport, Sessie, Presentatie, Applicatie."}},
      {title:{en:"Subnetting",nl:"Subnetten"},content:{en:"/24=254 usable, /25=126, /26=62, /27=30. Formula: 2^(32-prefix)-2",nl:"/24=254 bruikbaar, /25=126, /26=62, /27=30. Formule: 2^(32-prefix)-2"}},
      {title:{en:"VLANs",nl:"VLAN's"},content:{en:"Logical segmentation. Access port = one VLAN. Trunk port = multiple VLANs (802.1Q).",nl:"Logische segmentatie. Toegangspoort = één VLAN. Trunkpoort = meerdere VLAN's (802.1Q)."}},
      {title:{en:"Spanning Tree",nl:"Spanning Tree"},content:{en:"Prevents Layer 2 loops. Root bridge = lowest Bridge ID. Blocked ports stop loops.",nl:"Voorkomt laag-2-lussen. Rootbrug = laagste Bridge ID. Geblokkeerde poorten stoppen lussen."}},
      {title:{en:"OSPF",nl:"OSPF"},content:{en:"Link-state protocol. Area 0 = backbone. Hello packets maintain adjacency.",nl:"Link-state protocol. Gebied 0 = backbone. Hello-pakketten onderhouden buren."}},
      {title:{en:"NAT / PAT",nl:"NAT / PAT"},content:{en:"Maps private to public IPs. PAT overloads one public IP using port numbers.",nl:"Koppelt privé aan openbaar IP. PAT overloadt één openbaar IP via poortnummers."}},
    ],
    flashcards:[
      {q:{en:"What does VLAN stand for?",nl:"Waar staat VLAN voor?"},a:{en:"Virtual Local Area Network – logical Layer 2 segmentation.",nl:"Virtual Local Area Network – logische laag-2-segmentatie."}},
      {q:{en:"Default VLAN on a Cisco switch?",nl:"Standaard VLAN op een Cisco-switch?"},a:{en:"VLAN 1",nl:"VLAN 1"}},
      {q:{en:"What layer does a router operate at?",nl:"Op welke laag werkt een router?"},a:{en:"Layer 3 – Network Layer",nl:"Laag 3 – Netwerklaag"}},
      {q:{en:"What prevents Layer 2 loops?",nl:"Wat voorkomt laag-2-lussen?"},a:{en:"Spanning Tree Protocol (STP)",nl:"Spanning Tree Protocol (STP)"}},
      {q:{en:"What is a trunk port?",nl:"Wat is een trunkpoort?"},a:{en:"Carries multiple VLANs using 802.1Q tagging.",nl:"Draagt meerdere VLAN's via 802.1Q-tagging."}},
      {q:{en:"What does OSPF stand for?",nl:"Waar staat OSPF voor?"},a:{en:"Open Shortest Path First – link-state routing.",nl:"Open Shortest Path First – link-state routering."}},
    ],
    quiz:[
      {q:{en:"Which OSI layer handles IP addressing?",nl:"Welke OSI-laag verwerkt IP-adressering?"},options:{en:["Layer 1","Layer 2","Layer 3","Layer 4"],nl:["Laag 1","Laag 2","Laag 3","Laag 4"]},answer:2},
      {q:{en:"Usable hosts in /26?",nl:"Bruikbare hosts in /26?"},options:{en:["30","62","126","254"],nl:["30","62","126","254"]},answer:1},
      {q:{en:"What elects Root Bridge in STP?",nl:"Wat kiest rootbrug in STP?"},options:{en:["Highest IP","Lowest Bridge ID","Fastest port","Admin"],nl:["Hoogste IP","Laagste Bridge ID","Snelste poort","Beheer"]},answer:1},
      {q:{en:"Routing table command on Cisco?",nl:"Routeringstabel commando op Cisco?"},options:{en:["show ip arp","show int","show ip route","show ver"],nl:["show ip arp","show int","show ip route","show ver"]},answer:2},
      {q:{en:"What does 802.1Q define?",nl:"Wat definieert 802.1Q?"},options:{en:["Wi-Fi","VLAN tagging","Spanning tree","OSPF"],nl:["Wi-Fi","VLAN-tagging","Spanning tree","OSPF"]},answer:1},
    ]
  },
  "IT Architecture": {
    icon:"A", color:"#533AB7", bg:"#EEEDFE", darkColor:"#AFA9EC", darkBg:"#16102e",
    desc:{en:"Core IT Architecture Concepts",nl:"Kern IT-Architectuurconcepten"},
    cheatsheet:[
      {title:{en:"High Availability",nl:"Hoge Beschikbaarheid"},content:{en:"Redundancy to minimize downtime. 99.9% = ~8.7h/yr. Clustering, load balancing, failover.",nl:"Redundantie om uitvaltijd te minimaliseren. 99,9% = ~8,7u/jaar. Clustering, taakverdeling, failover."}},
      {title:{en:"CAP Theorem",nl:"CAP-stelling"},content:{en:"Guarantee only 2 of 3: Consistency, Availability, Partition Tolerance.",nl:"Garandeer slechts 2 van 3: Consistentie, Beschikbaarheid, Partitietolerantie."}},
      {title:{en:"Microservices",nl:"Microservices"},content:{en:"Independent services deployed separately, communicating via APIs.",nl:"Onafhankelijke services, elk apart geïmplementeerd, communiceert via API's."}},
      {title:{en:"Load Balancing",nl:"Taakverdeling"},content:{en:"Distributes traffic. Algorithms: Round Robin, Least Connections, IP Hash.",nl:"Verdeelt verkeer. Algoritmen: Round Robin, Minste verbindingen, IP Hash."}},
      {title:{en:"Zero Trust",nl:"Zero Trust"},content:{en:"Never trust, always verify. No implicit trust by network location.",nl:"Nooit vertrouwen, altijd verifiëren. Geen impliciete vertrouwensrelatie op basis van netwerk."}},
      {title:{en:"CI/CD",nl:"CI/CD"},content:{en:"Auto build/test on commit. Auto release to production on success.",nl:"Automatisch bouwen/testen bij commit. Automatisch uitrollen bij succes."}},
    ],
    flashcards:[
      {q:{en:"What is RPO?",nl:"Wat is RPO?"},a:{en:"Recovery Point Objective – max acceptable data loss after failure.",nl:"Recovery Point Objective – maximaal acceptabeel gegevensverlies na storing."}},
      {q:{en:"What is RTO?",nl:"Wat is RTO?"},a:{en:"Recovery Time Objective – max time to restore service after failure.",nl:"Recovery Time Objective – maximale hersteltijd na een storing."}},
      {q:{en:"What is horizontal scaling?",nl:"Wat is horizontale schaling?"},a:{en:"Adding more instances/machines to handle load.",nl:"Meer instanties/machines toevoegen om belasting te verwerken."}},
      {q:{en:"What is a single point of failure?",nl:"Wat is een enkel storingspunt?"},a:{en:"A component whose failure brings down the whole system.",nl:"Een component waarvan uitval het hele systeem platgooit."}},
      {q:{en:"What does CI/CD automate?",nl:"Wat automatiseert CI/CD?"},a:{en:"Build, test and deploy pipeline from commit to production.",nl:"Bouw-, test- en implementatiepijplijn van commit tot productie."}},
      {q:{en:"What is Zero Trust?",nl:"Wat is Zero Trust?"},a:{en:"Never trust, always verify — no implicit trust from network position.",nl:"Nooit vertrouwen, altijd verifiëren — geen impliciete vertrouwensrelatie."}},
    ],
    quiz:[
      {q:{en:"What does RTO measure?",nl:"Wat meet RTO?"},options:{en:["Data loss","Recovery time","Replication","Timeout"],nl:["Gegevensverlies","Hersteltijd","Replicatie","Time-out"]},answer:1},

let dark = false, lang = "nl", topic = "MD-102", activeTab = 0;
let fcIdx = 0, fcFlipped = false;
let quizIdx = 0, quizAns = null, quizScore = 0, quizDone = false;
let activeNode = null, promptFilter = "All", expandedPrompt = null;
let chatMessages = [];

function tc(){return dark?TOPICS[topic].darkColor:TOPICS[topic].color}
function tbg(){return dark?TOPICS[topic].darkBg:TOPICS[topic].bg}

function applyTheme(){
  document.body.classList.toggle("dark",dark);
  document.getElementById("tLight").classList.toggle("on",!dark);
  document.getElementById("tDark").classList.toggle("on",dark);
  document.documentElement.style.setProperty("--tc",tc());
  document.documentElement.style.setProperty("--tcbg",tbg());
  document.getElementById("logoDot").style.background=tc();
  renderFlow();
}

function toggleTheme(){dark=!dark;applyTheme();}
function toggleLang(){
  lang=lang==="nl"?"en":"nl";
  document.getElementById("tNL").classList.toggle("on",lang==="nl");
  document.getElementById("tEN").classList.toggle("on",lang==="en");
  renderAll();
}

function setTopic(k){
  topic=k;fcIdx=0;fcFlipped=false;
  quizIdx=0;quizAns=null;quizScore=0;quizDone=false;
  activeNode=null;chatMessages=[];
  document.documentElement.style.setProperty("--tc",tc());
  document.documentElement.style.setProperty("--tcbg",tbg());
  document.getElementById("logoDot").style.background=tc();
  renderAll();
}

function setTab(i){
  activeTab=i;
  document.querySelectorAll(".tab-btn").forEach((b,j)=>b.classList.toggle("active",j===i));
  document.querySelectorAll(".section").forEach((s,j)=>s.classList.toggle("active",j===i));
  const tb=document.getElementById("topicBar");
  tb.style.display=i===5?"none":"flex";
  if(i===1)renderFlow();
}

function renderAll(){
  const tx=TX[lang];
  document.getElementById("appSub").textContent=tx.appSub;
  document.getElementById("mTitle").textContent=tx.addTitle;
  document.getElementById("mSub").textContent=tx.addDesc;
  document.getElementById("newTopicInput").placeholder=tx.addPh;
  document.getElementById("mCancel").textContent=tx.cancel;
  document.getElementById("mConfirm").textContent=tx.confirm;
  renderTabs();
  renderTopicBar();
  renderSections();
}

function renderTabs(){
  const tx=TX[lang];
  const bar=document.getElementById("tabBar");
  bar.innerHTML=tx.tabs.map((t,i)=>`<button class="tab-btn${i===activeTab?" active":""}" onclick="setTab(${i})">${t}</button>`).join("");
}

function renderTopicBar(){
  const tx=TX[lang];
  const bar=document.getElementById("topicBar");
  bar.innerHTML=Object.keys(TOPICS).map(k=>{
    const col=dark?TOPICS[k].darkColor:TOPICS[k].color;
    const bg=dark?TOPICS[k].darkBg:TOPICS[k].bg;
    const isActive=k===topic;
    return `<button class="topic-btn${isActive?" active":""}" onclick="setTopic('${k}')" style="${isActive?`border:1.5px solid ${col};background:${bg};color:${col}`:`color:var(--muted)`}">
      <span class="topic-icon" style="background:${col};color:${dark?"#000":"#fff"}">${TOPICS[k].icon}</span>${k}
    </button>`;
  }).join("")+`<button class="add-btn" onclick="openModal()">${TX[lang].addBtn}</button>`;
}

function renderSections(){
  const tx=TX[lang];
  const t=TOPICS[topic];
  const col=tc();
  const bg=tbg();
  const wrap=document.getElementById("sections");
  wrap.innerHTML="";

  // HOME
  const home=document.createElement("div");
  home.className="section"+(activeTab===0?" active":"");
  home.innerHTML=`<div class="card">
    <div style="font-size:14px;font-weight:500;color:${col};margin-bottom:4px">${t.desc[lang]}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${t.flashcards.length} ${tx.cards} &middot; ${t.quiz.length} ${tx.questions} &middot; ${t.cheatsheet.length} ${tx.refs}</div>
    <div class="home-grid">${TX[lang].tabs.slice(1).map((m,i)=>`<button class="home-btn" onclick="setTab(${i+1})">${m} →</button>`).join("")}</div>
  </div>
  <div class="label-sm">${tx.quickFacts}</div>
  ${t.cheatsheet.slice(0,3).map(item=>`<div class="card"><div style="font-size:13px;font-weight:500;color:${col};margin-bottom:4px">${item.title[lang]}</div><div style="font-size:13px;color:var(--muted);line-height:1.6">${item.content[lang]}</div></div>`).join("")}`;
  wrap.appendChild(home);

  // FLOW
  const flow=document.createElement("div");
  flow.className="section"+(activeTab===1?" active":"");
  flow.innerHTML=`<div style="padding:4px 14px 10px;font-size:11px;color:var(--muted)">${tx.clickNode}</div>
  <div class="flow-wrap"><svg id="flowSvg" style="display:block;min-width:390px;min-height:330px" viewBox="0 0 390 330" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div class="flow-info" id="flowInfo"></div>
  <div class="flow-hint" id="flowHint">${tx.clickNode}</div>`;
  wrap.appendChild(flow);

  // FLASHCARDS
  const fc=document.createElement("div");
  fc.className="section"+(activeTab===2?" active":"");
  const card=t.flashcards[fcIdx];
  fc.innerHTML=`<div style="padding:4px 14px 8px;font-size:12px;color:var(--muted)">${tx.cardOf(fcIdx+1,t.flashcards.length)}</div>
  <div class="fc-card" id="fcCard" onclick="flipCard()" style="border-color:${fcFlipped?col:"var(--border)"}">
    <div class="fc-label">${fcFlipped?tx.answer:tx.question}</div>
    <div class="fc-text">${fcFlipped?card.a[lang]:card.q[lang]}</div>
  </div>
  <div class="fc-nav">
    <button class="btn btn-full" onclick="fcPrev()">${tx.prev}</button>
    <button class="btn btn-accent btn-full" onclick="fcNext()">${tx.next}</button>
  </div>
  <div class="dots">${t.flashcards.map((_,i)=>`<button class="dot-sm${i===fcIdx?" active":""}" onclick="fcGo(${i})"></button>`).join("")}</div>`;
  wrap.appendChild(fc);

  // QUIZ
  const quiz=document.createElement("div");
  quiz.className="section"+(activeTab===3?" active":"");
  if(quizDone){
    quiz.innerHTML=`<div class="card" style="text-align:center">
      <div class="quiz-score">${tx.correct(quizScore,t.quiz.length)}</div>
      <div class="quiz-msg">${quizScore>=t.quiz.length*0.8?tx.great:tx.keep}</div>
      <button class="btn btn-accent" onclick="resetQuiz()">${tx.retry}</button>
    </div>`;
  } else {
    const q=t.quiz[quizIdx];
    quiz.innerHTML=`<div style="padding:4px 14px 8px;font-size:12px;color:var(--muted)">${tx.query(quizIdx+1,t.quiz.length)}</div>

      if(quizAns!==null){if(i===q.answer)cls+=" correct";else if(i===quizAns)cls+=" wrong";}
      return `<button class="opt${quizAns!==null?" opt":""}" style="${quizAns!==null&&i===q.answer?`background:${bg};color:${col};border:1.5px solid ${col}`:""}${quizAns!==null&&i===quizAns&&i!==q.answer?";background:"+(dark?"#1a0000":"#fef2f2")+";color:#dc2626;border:1.5px solid #dc2626":""}" onclick="answerQuiz(${i})">${opt}</button>`;
    }).join("")}
    ${quizAns!==null?`<div style="padding:4px 12px"><button class="btn btn-accent btn-full" onclick="nextQuiz()">${quizIdx+1>=t.quiz.length?tx.seeResults:tx.nextQ}</button></div>`:""}`;
  }
  wrap.appendChild(quiz);

  // CHEAT SHEET
  const cs=document.createElement("div");
  cs.className="section"+(activeTab===4?" active":"");
  cs.innerHTML=t.cheatsheet.map(item=>`<div class="card-accent" style="border-left:3px solid ${col}">
    <div style="font-size:13px;font-weight:500;color:${col};margin-bottom:6px">${item.title[lang]}</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.7">${item.content[lang]}</div>
  </div>`).join("");
  wrap.appendChild(cs);

  // VIBE PROMPTS
  const vibe=document.createElement("div");
  vibe.className="section"+(activeTab===5?" active":"");
  const allTags=["All",...new Set(PROMPTS.map(p=>p.tag))];
  const filtered=promptFilter==="All"?PROMPTS:PROMPTS.filter(p=>p.tag===promptFilter);
  vibe.innerHTML=`<div style="padding:8px 14px 10px">
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px">${TX[lang].vibeDesc}</div>
    <div class="prompt-filter">${allTags.map(tag=>`<button class="filter-btn${tag===promptFilter?" active":""}" onclick="setPromptFilter('${tag}')">${tag}</button>`).join("")}</div>
  </div>
  ${filtered.map((p,i)=>{
    const realIdx=PROMPTS.indexOf(p);
    const open=expandedPrompt===realIdx;
    return `<div class="prompt-item">
      <div class="prompt-header" onclick="togglePrompt(${realIdx})">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="prompt-tag">${p.tag}</span>
          <span class="prompt-title">${p.title[lang]}</span>
        </div>
        <span class="prompt-toggle">${open?"−":"+"}</span>
      </div>
      <div class="prompt-body${open?" open":""}">
        <button class="copy-btn" id="copyBtn${realIdx}" onclick="copyPrompt(${realIdx})">${TX[lang].copyBtn}</button>
        <div style="clear:both"></div>
        <pre class="prompt-text">${p.text}</pre>
      </div>
    </div>`;
  }).join("")}`;
  wrap.appendChild(vibe);

  // AI TUTOR
  const ai=document.createElement("div");
  ai.className="section"+(activeTab===6?" active":"");
  ai.innerHTML=`<div class="chat-wrap">
    <div class="chat-label">${TX[lang].askAnything} ${topic}</div>
    <div class="chat-msgs" id="chatMsgs">
      ${chatMessages.length===0?`<div style="text-align:center;padding:32px 0;color:var(--muted)">
        <div style="font-size:12px;margin-bottom:16px">${TX[lang].askAnything} ${topic}</div>
        <button class="chat-suggest" onclick="setSuggest('${TX[lang].s1}')">${TX[lang].s1}</button>
        <button class="chat-suggest" onclick="setSuggest('${TX[lang].s2}')">${TX[lang].s2}</button>
        <button class="chat-suggest" onclick="setSuggest('${TX[lang].s3}')">${TX[lang].s3}</button>
      </div>`:chatMessages.map(m=>`<div class="chat-msg ${m.role==="user"?"user":"ai"}">${m.content}</div>`).join("")}
      ${chatLoading?`<div class="chat-msg ai">${TX[lang].thinking}</div>`:""}
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn btn-accent" onclick="sendChat()">${TX[lang].send}</button>
    </div>
  </div>`;
  wrap.appendChild(ai);

  if(activeTab===1)renderFlow();
  const msgs=document.getElementById("chatMsgs");
  if(msgs)msgs.scrollTop=msgs.scrollHeight;
}

function renderFlow(){
  const svg=document.getElementById("flowSvg");
  if(!svg)return;
  const nodes=FLOW_NODES[topic]||[];
  const edges=FLOW_EDGES[topic]||[];
  const isDark=dark;
  const lineColor=isDark?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.12)";
  const labelColor=isDark?"#444":"#bbb";
  const arrowColor=isDark?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.2)";
  const W=96,H=40;

  const getC=id=>{const n=nodes.find(x=>x.id===id);return n?{x:n.x+W/2,y:n.y+H/2}:{x:0,y:0}};

  let html=`<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="${arrowColor}"/></marker></defs>`;

  edges.forEach(e=>{
    const f=getC(e.from),t=getC(e.to);
    const mx=(f.x+t.x)/2,my=(f.y+t.y)/2;
    html+=`<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" stroke="${lineColor}" stroke-width="1" marker-end="url(#arr)"/>`;
    html+=`<text x="${mx}" y="${my-5}" text-anchor="middle" font-size="9" fill="${labelColor}" font-family="system-ui">${e.label}</text>`;
  });

  nodes.forEach(n=>{
    const col=isDark?n.darkColor:n.color;
    const bg=isDark?n.darkBg:n.bg;
    const isActive=activeNode===n.id;
    const stroke=isActive?col:(isDark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.09)");
    const sw=isActive?1.5:0.5;
    html+=`<g onclick="clickNode('${n.id}')" style="cursor:pointer">
      <rect x="${n.x}" y="${n.y}" width="${W}" height="${H}" rx="8" fill="${bg}" stroke="${stroke}" stroke-width="${sw}"/>
      <text x="${n.x+W/2}" y="${n.y+15}" text-anchor="middle" font-size="11" font-weight="500" fill="${col}" font-family="system-ui">${n.label}</text>
      <text x="${n.x+W/2}" y="${n.y+29}" text-anchor="middle" font-size="9" fill="${col}88" font-family="system-ui">${isActive?"close":"tap for info"}</text>
    </g>`;
  });
  svg.innerHTML=html;

  const info=document.getElementById("flowInfo");
  const hint=document.getElementById("flowHint");
  if(!info||!hint)return;
  if(activeNode){
    const n=nodes.find(x=>x.id===activeNode);
    if(n){
      const col=isDark?n.darkColor:n.color;
      const bg=isDark?n.darkBg:n.bg;
      info.style.display="block";
      info.style.border="1.5px solid "+col;
      info.style.background=bg;
      info.innerHTML=`<div style="font-size:13px;font-weight:500;color:${col};margin-bottom:6px">${n.label}</div><div style="font-size:13px;line-height:1.7;color:var(--text)">${n.desc[lang]}</div>`;
      hint.style.display="none";
    }
  } else {
    info.style.display="none";
    hint.style.display="block";
    hint.textContent=TX[lang].clickNode;
  }
}

function clickNode(id){
  activeNode=activeNode===id?null:id;
  renderFlow();
}

function flipCard(){fcFlipped=!fcFlipped;renderSections();}
function fcPrev(){if(fcIdx>0){fcIdx--;fcFlipped=false;renderSections();}}
function fcNext(){fcIdx=(fcIdx+1)%TOPICS[topic].flashcards.length;fcFlipped=false;renderSections();}
function fcGo(i){fcIdx=i;fcFlipped=false;renderSections();}

function answerQuiz(i){
  if(quizAns!==null)return;
  quizAns=i;
  if(i===TOPICS[topic].quiz[quizIdx].answer)quizScore++;
  renderSections();
}
function nextQuiz(){
  if(quizIdx+1>=TOPICS[topic].quiz.length){quizDone=true;}
  else{quizIdx++;quizAns=null;}
  renderSections();
}
function resetQuiz(){quizIdx=0;quizAns=null;quizScore=0;quizDone=false;renderSections();}

function setPromptFilter(f){promptFilter=f;renderSections();}
function togglePrompt(i){expandedPrompt=expandedPrompt===i?null:i;renderSections();}
function copyPrompt(i){
  navigator.clipboard.writeText(PROMPTS[i].text).then(()=>{
    const btn=document.getElementById("copyBtn"+i);
    if(btn){btn.textContent=TX[lang].copied;setTimeout(()=>{btn.textContent=TX[lang].copyBtn;},1500);}
  });
}

let chatLoading=false;
function setSuggest(t){const inp=document.getElementById("chatInput");if(inp)inp.value=t;}
async function sendChat(){
  const inp=document.getElementById("chatInput");
  if(!inp||!inp.value.trim()||chatLoading)return;
  const msg=inp.value.trim();inp.value="";
  chatMessages.push({role:"user",content:msg});
  chatLoading=true;renderSections();
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"You are a focused IT study tutor for "+topic+". Respond in "+(lang==="nl"?"Dutch":"English")+". Be concise, under 200 words.",messages:chatMessages})});
    const data=await res.json();
    const reply=data.content?data.content.map(b=>b.text||"").join(""):"Geen antwoord.";
    chatMessages.push({role:"assistant",content:reply});
  } catch{chatMessages.push({role:"assistant",content:"Verbindingsfout."});}
  chatLoading=false;renderSections();
}

function openModal(){document.getElementById("addModal").classList.add("open");}
function closeModal(){document.getElementById("addModal").classList.remove("open");}
function confirmAdd(){
  const val=document.getElementById("newTopicInput").value.trim();
  if(val){alert(val+" "+(lang==="nl"?"toegevoegd! Gebruik AI Tutor om het te bestuderen.":"added! Use AI Tutor to study it."));closeModal();document.getElementById("newTopicInput").value="";}
}

document.getElementById("addModal").addEventListener("click",function(e){if(e.target===this)closeModal();});

renderAll();
</script>
